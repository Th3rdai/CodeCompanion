<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Code Companion — PM's Technical Translator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: {
        brand: '#8b5cf6', cyan: '#06b6d4',
        surface: '#1e293b', 'surface-light': '#334155', base: '#0f172a'
      }}}
    }
  </script>
  <style>
    body { background: #0f172a; color: #f8fafc; font-family: system-ui, -apple-system, sans-serif; }
    .code-font { font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace; }
    .fade-in { animation: fadeIn 0.3s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
    .typing-dot { animation: pulse 1.4s infinite; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    /* Markdown rendered content */
    .prose h2 { font-size: 1.15rem; font-weight: 700; margin-top: 1.2rem; margin-bottom: 0.5rem; color: #c4b5fd; }
    .prose h3 { font-size: 1rem; font-weight: 600; margin-top: 1rem; margin-bottom: 0.4rem; color: #e2e8f0; }
    .prose p { margin-bottom: 0.6rem; line-height: 1.6; }
    .prose ul, .prose ol { margin-left: 1.2rem; margin-bottom: 0.6rem; }
    .prose li { margin-bottom: 0.3rem; line-height: 1.5; }
    .prose strong { color: #e2e8f0; }
    .prose code { background: #334155; padding: 0.15rem 0.4rem; border-radius: 0.25rem; font-size: 0.85em; }
    .prose pre { background: #1a1a2e; border-radius: 0.5rem; padding: 1rem; overflow-x: auto; margin: 0.75rem 0; }
    .prose pre code { background: none; padding: 0; font-size: 0.85em; }
    .scrollbar-thin::-webkit-scrollbar { width: 6px; }
    .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback, useMemo } = React;

    // ── Modes ───────────────────────────────────────
    const MODES = [
      { id: 'explain',        label: 'Explain',     icon: '💡', desc: 'What does this code do?', placeholder: 'Paste code here and I\'ll explain what it does in plain English...' },
      { id: 'bugs',           label: 'Bug Hunter',  icon: '🐛', desc: 'Find issues & risks',     placeholder: 'Paste code here and I\'ll identify potential bugs, security issues, and risks...' },
      { id: 'refactor',       label: 'Refactor',    icon: '✨', desc: 'Improve this code',       placeholder: 'Paste code here and I\'ll suggest improvements with explanations...' },
      { id: 'translate-tech', label: 'Tech → Biz',  icon: '📋', desc: 'Technical to business',   placeholder: 'Paste a technical spec, PR description, or code...\nI\'ll translate it into business language.' },
      { id: 'translate-biz',  label: 'Biz → Tech',  icon: '🔧', desc: 'Business to technical',   placeholder: 'Describe a feature request or product requirement...\nI\'ll produce technical specs.' },
    ];

    // ── Markdown renderer ───────────────────────────
    function renderMarkdown(text) {
      if (!text) return '';
      try {
        const html = marked.parse(text, { breaks: true });
        return html;
      } catch { return text; }
    }

    function MarkdownContent({ content }) {
      const ref = useRef(null);
      useEffect(() => {
        if (ref.current) {
          ref.current.querySelectorAll('pre code').forEach(block => {
            hljs.highlightElement(block);
          });
        }
      }, [content]);
      return <div ref={ref} className="prose" dangerouslySetInnerHTML={{ __html: renderMarkdown(content) }} />;
    }

    // ── Typing Indicator ────────────────────────────
    function TypingIndicator() {
      return (
        <div className="flex items-center gap-1.5 p-3">
          <div className="w-2 h-2 bg-violet-400 rounded-full typing-dot"></div>
          <div className="w-2 h-2 bg-violet-400 rounded-full typing-dot"></div>
          <div className="w-2 h-2 bg-violet-400 rounded-full typing-dot"></div>
        </div>
      );
    }

    // ── Message Bubble ──────────────────────────────
    function MessageBubble({ role, content }) {
      const isUser = role === 'user';
      return (
        <div className={`fade-in mb-4 flex ${isUser ? 'justify-end' : 'justify-start'}`}>
          <div className={`max-w-[85%] rounded-xl px-4 py-3 ${
            isUser
              ? 'bg-violet-600/30 border border-violet-500/30'
              : 'bg-surface border border-slate-700/50'
          }`}>
            {isUser ? (
              <pre className="code-font text-sm whitespace-pre-wrap text-slate-200">{content}</pre>
            ) : (
              <MarkdownContent content={content} />
            )}
          </div>
        </div>
      );
    }

    // ── Sidebar ─────────────────────────────────────
    function Sidebar({ history, activeId, onSelect, onNew, onDelete, open, onClose }) {
      return (
        <>
          {open && <div className="fixed inset-0 bg-black/50 z-30 lg:hidden" onClick={onClose} />}
          <div className={`fixed lg:relative top-0 left-0 h-full w-72 bg-surface border-r border-slate-700/50 z-40
            flex flex-col transition-transform duration-200
            ${open ? 'translate-x-0' : '-translate-x-full lg:translate-x-0'}`}>
            <div className="p-4 border-b border-slate-700/50">
              <button onClick={onNew}
                className="w-full bg-violet-600 hover:bg-violet-700 text-white rounded-lg py-2.5 px-4 font-medium transition-colors">
                + New Conversation
              </button>
            </div>
            <div className="flex-1 overflow-y-auto scrollbar-thin p-2">
              {history.length === 0 && (
                <p className="text-center text-slate-500 text-sm py-8">No conversations yet</p>
              )}
              {history.map(h => (
                <div key={h.id}
                  className={`group flex items-center gap-2 rounded-lg px-3 py-2.5 mb-1 cursor-pointer transition-colors
                    ${activeId === h.id ? 'bg-violet-600/20 border border-violet-500/30' : 'hover:bg-slate-700/50'}`}
                  onClick={() => { onSelect(h.id); onClose(); }}>
                  <span className="text-sm">{MODES.find(m => m.id === h.mode)?.icon || '💬'}</span>
                  <div className="flex-1 min-w-0">
                    <div className="text-sm text-slate-200 truncate">{h.title || 'Untitled'}</div>
                    <div className="text-xs text-slate-500">{new Date(h.createdAt).toLocaleDateString()}</div>
                  </div>
                  <button onClick={(e) => { e.stopPropagation(); onDelete(h.id); }}
                    className="opacity-0 group-hover:opacity-100 text-slate-500 hover:text-red-400 text-xs transition-opacity">
                    ✕
                  </button>
                </div>
              ))}
            </div>
          </div>
        </>
      );
    }

    // ── Copy Button ─────────────────────────────────
    function CopyButton({ text }) {
      const [copied, setCopied] = useState(false);
      const handleCopy = () => {
        navigator.clipboard.writeText(text);
        setCopied(true);
        setTimeout(() => setCopied(false), 2000);
      };
      return (
        <button onClick={handleCopy}
          className="text-xs px-2 py-1 rounded bg-slate-700 hover:bg-slate-600 text-slate-400 transition-colors">
          {copied ? '✓ Copied' : '📋 Copy'}
        </button>
      );
    }

    // ── Main App ────────────────────────────────────
    function App() {
      const [models, setModels] = useState([]);
      const [selectedModel, setSelectedModel] = useState('');
      const [connected, setConnected] = useState(false);
      const [mode, setMode] = useState('explain');
      const [input, setInput] = useState('');
      const [messages, setMessages] = useState([]);
      const [streaming, setStreaming] = useState(false);
      const [history, setHistory] = useState([]);
      const [activeConvId, setActiveConvId] = useState(null);
      const [sidebarOpen, setSidebarOpen] = useState(false);
      const [stats, setStats] = useState(null);
      const messagesEndRef = useRef(null);
      const inputRef = useRef(null);

      // Scroll to bottom on new messages
      useEffect(() => {
        messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
      }, [messages, streaming]);

      // Load models on mount
      useEffect(() => {
        fetchModels();
        fetchHistory();
      }, []);

      async function fetchModels() {
        try {
          const res = await fetch('/api/models');
          const data = await res.json();
          if (data.models) {
            setModels(data.models);
            setConnected(true);
            if (data.models.length > 0 && !selectedModel) {
              setSelectedModel(data.models[0].name);
            }
          } else {
            setConnected(false);
          }
        } catch {
          setConnected(false);
        }
      }

      async function fetchHistory() {
        try {
          const res = await fetch('/api/history');
          setHistory(await res.json());
        } catch {}
      }

      async function loadConversation(id) {
        try {
          const res = await fetch(`/api/history/${id}`);
          const conv = await res.json();
          setMessages(conv.messages || []);
          setMode(conv.mode || 'explain');
          setActiveConvId(conv.id);
          if (conv.model) setSelectedModel(conv.model);
        } catch {}
      }

      async function saveConversation(msgs, convMode) {
        const title = msgs[0]?.content?.slice(0, 60) || 'Untitled';
        const conv = {
          id: activeConvId || undefined,
          title,
          mode: convMode || mode,
          model: selectedModel,
          createdAt: activeConvId ? undefined : new Date().toISOString(),
          messages: msgs,
        };
        // Preserve createdAt for existing conversations
        if (activeConvId) {
          const existing = history.find(h => h.id === activeConvId);
          if (existing) conv.createdAt = existing.createdAt;
        } else {
          conv.createdAt = new Date().toISOString();
        }
        try {
          const res = await fetch('/api/history', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(conv),
          });
          const { id } = await res.json();
          setActiveConvId(id);
          fetchHistory();
        } catch {}
      }

      async function deleteConversation(id) {
        try {
          await fetch(`/api/history/${id}`, { method: 'DELETE' });
          if (activeConvId === id) { setMessages([]); setActiveConvId(null); }
          fetchHistory();
        } catch {}
      }

      function startNew() {
        setMessages([]);
        setActiveConvId(null);
        setStats(null);
        setInput('');
      }

      async function handleSend() {
        if (!input.trim() || streaming || !selectedModel) return;

        const userMsg = { role: 'user', content: input.trim() };
        const newMessages = [...messages, userMsg];
        setMessages(newMessages);
        setInput('');
        setStreaming(true);
        setStats(null);

        try {
          const res = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              model: selectedModel,
              mode,
              messages: newMessages.map(m => ({ role: m.role, content: m.content })),
            }),
          });

          const reader = res.body.getReader();
          const decoder = new TextDecoder();
          let assistantContent = '';
          let buffer = '';

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split('\n');
            buffer = lines.pop();

            for (const line of lines) {
              if (!line.startsWith('data: ')) continue;
              const payload = line.slice(6);
              if (payload === '[DONE]') break;

              try {
                const parsed = JSON.parse(payload);
                if (parsed.token) {
                  assistantContent += parsed.token;
                  setMessages([...newMessages, { role: 'assistant', content: assistantContent }]);
                }
                if (parsed.done) {
                  setStats({
                    tokens: parsed.eval_count,
                    duration: parsed.total_duration ? (parsed.total_duration / 1e9).toFixed(1) : null,
                  });
                }
                if (parsed.error) {
                  assistantContent += `\n\n⚠️ Error: ${parsed.error}`;
                  setMessages([...newMessages, { role: 'assistant', content: assistantContent }]);
                }
              } catch {}
            }
          }

          const finalMessages = [...newMessages, { role: 'assistant', content: assistantContent }];
          setMessages(finalMessages);
          saveConversation(finalMessages, mode);

        } catch (err) {
          setMessages([...newMessages, { role: 'assistant', content: `⚠️ Connection error: ${err.message}` }]);
        } finally {
          setStreaming(false);
        }
      }

      function handleKeyDown(e) {
        if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) {
          e.preventDefault();
          handleSend();
        }
      }

      const currentMode = MODES.find(m => m.id === mode);

      return (
        <div className="h-screen flex">
          {/* Sidebar */}
          <Sidebar
            history={history}
            activeId={activeConvId}
            onSelect={loadConversation}
            onNew={startNew}
            onDelete={deleteConversation}
            open={sidebarOpen}
            onClose={() => setSidebarOpen(false)}
          />

          {/* Main Area */}
          <div className="flex-1 flex flex-col min-w-0">
            {/* Header */}
            <header className="bg-surface/80 backdrop-blur border-b border-slate-700/50 px-4 py-3 flex items-center gap-3">
              <button onClick={() => setSidebarOpen(!sidebarOpen)} className="lg:hidden text-slate-400 hover:text-white text-xl">☰</button>
              <div className="flex-1">
                <h1 className="text-lg font-bold text-slate-100">🤖 Code Companion</h1>
                <p className="text-xs text-slate-400">PM's Technical Translator</p>
              </div>
              <div className="flex items-center gap-3">
                {/* Connection status */}
                <div className={`flex items-center gap-1.5 text-xs ${connected ? 'text-green-400' : 'text-red-400'}`}>
                  <div className={`w-2 h-2 rounded-full ${connected ? 'bg-green-400' : 'bg-red-400'}`}></div>
                  {connected ? 'Connected' : 'Offline'}
                </div>
                {/* Model selector */}
                <select value={selectedModel} onChange={e => setSelectedModel(e.target.value)}
                  className="bg-slate-700 text-slate-200 text-sm rounded-lg px-3 py-1.5 outline-none border border-slate-600 focus:border-violet-500">
                  {models.length === 0 && <option value="">No models</option>}
                  {models.map(m => (
                    <option key={m.name} value={m.name}>{m.name} ({m.size}GB)</option>
                  ))}
                </select>
              </div>
            </header>

            {/* Mode Tabs */}
            <div className="bg-surface/50 border-b border-slate-700/50 px-4 py-2 flex gap-2 overflow-x-auto">
              {MODES.map(m => (
                <button key={m.id} onClick={() => setMode(m.id)}
                  className={`flex items-center gap-1.5 px-3 py-2 rounded-lg text-sm whitespace-nowrap transition-all
                    ${mode === m.id
                      ? 'bg-violet-600/30 text-violet-300 border border-violet-500/40 font-medium'
                      : 'text-slate-400 hover:bg-slate-700/50 hover:text-slate-200'}`}>
                  <span>{m.icon}</span>
                  <span>{m.label}</span>
                </button>
              ))}
            </div>

            {/* Messages Area */}
            <div className="flex-1 overflow-y-auto scrollbar-thin px-4 py-4">
              {messages.length === 0 && (
                <div className="h-full flex items-center justify-center">
                  <div className="text-center max-w-md">
                    <div className="text-5xl mb-4">{currentMode?.icon}</div>
                    <h2 className="text-xl font-bold text-slate-200 mb-2">{currentMode?.label}</h2>
                    <p className="text-slate-400 mb-6">{currentMode?.desc}</p>
                    <div className="grid grid-cols-2 gap-2 text-left text-xs">
                      {mode === 'explain' && <>
                        <div className="bg-slate-800 rounded-lg p-3"><span className="text-violet-400">Try:</span> Paste a function and ask what it does</div>
                        <div className="bg-slate-800 rounded-lg p-3"><span className="text-violet-400">Try:</span> Paste an API endpoint for a summary</div>
                      </>}
                      {mode === 'bugs' && <>
                        <div className="bg-slate-800 rounded-lg p-3"><span className="text-violet-400">Try:</span> Paste code your team wrote for review</div>
                        <div className="bg-slate-800 rounded-lg p-3"><span className="text-violet-400">Try:</span> Check for security issues before launch</div>
                      </>}
                      {mode === 'refactor' && <>
                        <div className="bg-slate-800 rounded-lg p-3"><span className="text-violet-400">Try:</span> Paste messy code for improvement</div>
                        <div className="bg-slate-800 rounded-lg p-3"><span className="text-violet-400">Try:</span> Modernize legacy code snippets</div>
                      </>}
                      {(mode === 'translate-tech' || mode === 'translate-biz') && <>
                        <div className="bg-slate-800 rounded-lg p-3"><span className="text-violet-400">Try:</span> Translate a PR for stakeholders</div>
                        <div className="bg-slate-800 rounded-lg p-3"><span className="text-violet-400">Try:</span> Turn a feature request into specs</div>
                      </>}
                    </div>
                  </div>
                </div>
              )}

              {messages.map((msg, i) => (
                <div key={i} className="relative group">
                  <MessageBubble role={msg.role} content={msg.content} />
                  {msg.role === 'assistant' && !streaming && (
                    <div className="absolute top-2 right-2 opacity-0 group-hover:opacity-100 transition-opacity">
                      <CopyButton text={msg.content} />
                    </div>
                  )}
                </div>
              ))}

              {streaming && messages[messages.length - 1]?.role !== 'assistant' && <TypingIndicator />}

              <div ref={messagesEndRef} />
            </div>

            {/* Stats Bar */}
            {stats && (
              <div className="bg-surface/50 border-t border-slate-700/50 px-4 py-1.5 flex items-center gap-4 text-xs text-slate-500">
                <span>Model: {selectedModel}</span>
                {stats.tokens && <span>Tokens: {stats.tokens}</span>}
                {stats.duration && <span>Time: {stats.duration}s</span>}
              </div>
            )}

            {/* Input Area */}
            <div className="bg-surface border-t border-slate-700/50 p-4">
              <div className="flex gap-2">
                <textarea
                  ref={inputRef}
                  value={input}
                  onChange={e => setInput(e.target.value)}
                  onKeyDown={handleKeyDown}
                  placeholder={currentMode?.placeholder}
                  rows={4}
                  disabled={streaming || !connected}
                  className="flex-1 bg-slate-800 text-slate-100 code-font text-sm rounded-xl px-4 py-3 outline-none
                    border border-slate-700 focus:border-violet-500 resize-none
                    placeholder-slate-500 disabled:opacity-50"
                />
                <div className="flex flex-col gap-2">
                  <button onClick={handleSend}
                    disabled={!input.trim() || streaming || !connected}
                    className="flex-1 bg-violet-600 hover:bg-violet-700 disabled:bg-slate-700 disabled:text-slate-500
                      text-white rounded-xl px-4 font-medium transition-colors disabled:cursor-not-allowed">
                    {streaming ? '...' : 'Send'}
                  </button>
                  <span className="text-[10px] text-slate-600 text-center">⌘+Enter</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
