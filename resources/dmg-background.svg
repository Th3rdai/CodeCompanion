<svg xmlns="http://www.w3.org/2000/svg" width="620" height="420" viewBox="0 0 620 420">
  <defs>
    <!-- Background radial gradient -->
    <radialGradient id="bgGlow" cx="50%" cy="55%" r="60%" fx="50%" fy="55%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </radialGradient>

    <!-- Subtle top-down ambient light -->
    <linearGradient id="ambientLight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0"/>
    </linearGradient>

    <!-- Arrowhead marker -->
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6366f1" fill-opacity="0.3"/>
    </marker>
  </defs>

  <!-- Base background -->
  <rect width="620" height="420" fill="#0f172a"/>

  <!-- Radial glow -->
  <rect width="620" height="420" fill="url(#bgGlow)"/>

  <!-- Ambient top light -->
  <rect width="620" height="140" fill="url(#ambientLight)"/>

  <!-- Corner decorations — top-left -->
  <circle cx="30" cy="30" r="12" fill="none" stroke="#6366f1" stroke-opacity="0.1" stroke-width="1"/>
  <circle cx="30" cy="30" r="4" fill="#6366f1" fill-opacity="0.08"/>
  <line x1="15" y1="55" x2="50" y2="55" stroke="#6366f1" stroke-opacity="0.07" stroke-width="1"/>

  <!-- Corner decorations — top-right -->
  <circle cx="590" cy="30" r="12" fill="none" stroke="#6366f1" stroke-opacity="0.1" stroke-width="1"/>
  <circle cx="590" cy="30" r="4" fill="#6366f1" fill-opacity="0.08"/>
  <line x1="570" y1="55" x2="605" y2="55" stroke="#6366f1" stroke-opacity="0.07" stroke-width="1"/>

  <!-- Corner decorations — bottom-left -->
  <line x1="20" y1="390" x2="20" y2="405" stroke="#6366f1" stroke-opacity="0.08" stroke-width="1"/>
  <line x1="15" y1="400" x2="30" y2="400" stroke="#6366f1" stroke-opacity="0.08" stroke-width="1"/>
  <circle cx="45" cy="395" r="3" fill="none" stroke="#6366f1" stroke-opacity="0.07" stroke-width="1"/>

  <!-- Corner decorations — bottom-right -->
  <line x1="600" y1="385" x2="600" y2="400" stroke="#6366f1" stroke-opacity="0.08" stroke-width="1"/>
  <line x1="595" y1="390" x2="610" y2="390" stroke="#6366f1" stroke-opacity="0.08" stroke-width="1"/>

  <!-- Glassmorphic track bar -->
  <rect x="70" y="215" width="480" height="54" rx="14" ry="14"
        fill="white" fill-opacity="0.03"/>
  <rect x="70" y="215" width="480" height="54" rx="14" ry="14"
        fill="none" stroke="white" stroke-opacity="0.06" stroke-width="0.5"/>

  <!-- Inner subtle highlight on glass bar top half -->
  <rect x="71" y="216" width="478" height="26" rx="13" ry="13"
        fill="white" fill-opacity="0.015"/>

  <!-- Dotted guide line between icon positions -->
  <line x1="205" y1="242" x2="415" y2="242"
        stroke="#6366f1" stroke-opacity="0.25" stroke-width="1.5"
        stroke-dasharray="6 4"/>

  <!-- Arrow indicator pointing right -->
  <line x1="415" y1="242" x2="440" y2="242"
        stroke="#6366f1" stroke-opacity="0.3" stroke-width="1.5"
        marker-end="url(#arrowhead)"/>

  <!-- Subtle glow under left icon position -->
  <ellipse cx="160" cy="268" rx="30" ry="4" fill="#6366f1" fill-opacity="0.06"/>

  <!-- Subtle glow under right icon position -->
  <ellipse cx="460" cy="268" rx="30" ry="4" fill="#6366f1" fill-opacity="0.06"/>

  <!-- Title: Code Companion -->
  <text x="310" y="88" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="27" font-weight="bold" fill="white" letter-spacing="0.5">
    Code Companion
  </text>

  <!-- Subtitle: Vibe Coder Edition -->
  <text x="310" y="116" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="14" font-weight="400" fill="#94a3b8" letter-spacing="1.5">
    Vibe Coder Edition
  </text>

  <!-- Thin decorative line under subtitle -->
  <line x1="248" y1="130" x2="372" y2="130" stroke="#6366f1" stroke-opacity="0.15" stroke-width="0.5"/>

  <!-- Install instruction -->
  <text x="310" y="370" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="12" font-weight="400" fill="#64748b" letter-spacing="0.3">
    Drag to Applications to install
  </text>

  <!-- Th3rdAI branding — bottom-right corner -->
  <text x="585" y="406" text-anchor="end"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="9" font-weight="500" fill="#475569" fill-opacity="0.5" letter-spacing="0.5">
    Th3rdAI
  </text>
</svg>