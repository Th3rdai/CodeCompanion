<svg xmlns="http://www.w3.org/2000/svg" width="540" height="380" viewBox="0 0 540 380">
  <defs>
    <!-- Background radial gradient -->
    <radialGradient id="bgGlow" cx="50%" cy="55%" r="60%" fx="50%" fy="55%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </radialGradient>

    <!-- Subtle top-down ambient light -->
    <linearGradient id="ambientLight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0"/>
    </linearGradient>

    <!-- Arrowhead marker -->
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6366f1" fill-opacity="0.3"/>
    </marker>
  </defs>

  <!-- Base background -->
  <rect width="540" height="380" fill="#0f172a"/>

  <!-- Radial glow -->
  <rect width="540" height="380" fill="url(#bgGlow)"/>

  <!-- Ambient top light -->
  <rect width="540" height="120" fill="url(#ambientLight)"/>

  <!-- Corner decorations — top-left -->
  <circle cx="30" cy="30" r="12" fill="none" stroke="#6366f1" stroke-opacity="0.1" stroke-width="1"/>
  <circle cx="30" cy="30" r="4" fill="#6366f1" fill-opacity="0.08"/>
  <line x1="15" y1="55" x2="50" y2="55" stroke="#6366f1" stroke-opacity="0.07" stroke-width="1"/>

  <!-- Corner decorations — top-right -->
  <circle cx="510" cy="30" r="12" fill="none" stroke="#6366f1" stroke-opacity="0.1" stroke-width="1"/>
  <circle cx="510" cy="30" r="4" fill="#6366f1" fill-opacity="0.08"/>
  <line x1="490" y1="55" x2="525" y2="55" stroke="#6366f1" stroke-opacity="0.07" stroke-width="1"/>

  <!-- Corner decorations — bottom-left -->
  <line x1="20" y1="350" x2="20" y2="365" stroke="#6366f1" stroke-opacity="0.08" stroke-width="1"/>
  <line x1="15" y1="360" x2="30" y2="360" stroke="#6366f1" stroke-opacity="0.08" stroke-width="1"/>
  <circle cx="45" cy="355" r="3" fill="none" stroke="#6366f1" stroke-opacity="0.07" stroke-width="1"/>

  <!-- Corner decorations — bottom-right -->
  <line x1="520" y1="345" x2="520" y2="360" stroke="#6366f1" stroke-opacity="0.08" stroke-width="1"/>
  <line x1="515" y1="350" x2="530" y2="350" stroke="#6366f1" stroke-opacity="0.08" stroke-width="1"/>

  <!-- Glassmorphic track bar -->
  <rect x="60" y="195" width="420" height="50" rx="12" ry="12"
        fill="white" fill-opacity="0.03"/>
  <rect x="60" y="195" width="420" height="50" rx="12" ry="12"
        fill="none" stroke="white" stroke-opacity="0.06" stroke-width="0.5"/>

  <!-- Inner subtle highlight on glass bar top half -->
  <rect x="61" y="196" width="418" height="24" rx="11" ry="11"
        fill="white" fill-opacity="0.015"/>

  <!-- Dotted guide line between icon positions -->
  <line x1="175" y1="220" x2="365" y2="220"
        stroke="#6366f1" stroke-opacity="0.25" stroke-width="1.5"
        stroke-dasharray="6 4"/>

  <!-- Arrow indicator pointing right -->
  <line x1="365" y1="220" x2="390" y2="220"
        stroke="#6366f1" stroke-opacity="0.3" stroke-width="1.5"
        marker-end="url(#arrowhead)"/>

  <!-- Subtle glow under left icon position -->
  <ellipse cx="130" cy="242" rx="30" ry="4" fill="#6366f1" fill-opacity="0.06"/>

  <!-- Subtle glow under right icon position -->
  <ellipse cx="410" cy="242" rx="30" ry="4" fill="#6366f1" fill-opacity="0.06"/>

  <!-- Title: Code Companion -->
  <text x="270" y="80" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="24" font-weight="bold" fill="white" letter-spacing="0.5">
    Code Companion
  </text>

  <!-- Subtitle: Vibe Coder Edition -->
  <text x="270" y="105" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="13" font-weight="400" fill="#94a3b8" letter-spacing="1.5">
    Vibe Coder Edition
  </text>

  <!-- Thin decorative line under subtitle -->
  <line x1="220" y1="118" x2="320" y2="118" stroke="#6366f1" stroke-opacity="0.15" stroke-width="0.5"/>

  <!-- Install instruction -->
  <text x="270" y="330" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="12" font-weight="400" fill="#64748b" letter-spacing="0.3">
    Drag to Applications to install
  </text>

  <!-- Th3rdAI branding — bottom-right corner -->
  <text x="505" y="370" text-anchor="end"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="9" font-weight="500" fill="#475569" fill-opacity="0.5" letter-spacing="0.5">
    Th3rdAI
  </text>
</svg>