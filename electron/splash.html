<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Code Companion</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #0f172a;
        color: #e2e8f0;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        overflow: hidden;
        position: relative;
      }

      /* ── Animated gradient orbs ── */
      .orb {
        position: absolute;
        border-radius: 50%;
        filter: blur(80px);
        opacity: 0.35;
        will-change: transform;
      }

      .orb--1 {
        width: 400px;
        height: 400px;
        background: radial-gradient(circle, #6366f1 0%, transparent 70%);
        top: -10%;
        left: -8%;
        animation: orb-drift-1 14s ease-in-out infinite alternate;
      }

      .orb--2 {
        width: 350px;
        height: 350px;
        background: radial-gradient(circle, #8b5cf6 0%, transparent 70%);
        bottom: -12%;
        right: -6%;
        animation: orb-drift-2 18s ease-in-out infinite alternate;
      }

      .orb--3 {
        width: 250px;
        height: 250px;
        background: radial-gradient(circle, #06b6d4 0%, transparent 70%);
        top: 50%;
        left: 55%;
        transform: translate(-50%, -50%);
        opacity: 0.18;
        animation: orb-drift-3 20s ease-in-out infinite alternate;
      }

      @keyframes orb-drift-1 {
        0% {
          transform: translate(0, 0) scale(1);
        }
        100% {
          transform: translate(60px, 40px) scale(1.15);
        }
      }

      @keyframes orb-drift-2 {
        0% {
          transform: translate(0, 0) scale(1);
        }
        100% {
          transform: translate(-50px, -35px) scale(1.1);
        }
      }

      @keyframes orb-drift-3 {
        0% {
          transform: translate(-50%, -50%) scale(1);
        }
        100% {
          transform: translate(calc(-50% + 30px), calc(-50% - 45px)) scale(1.2);
        }
      }

      /* ── Perspective grid overlay ── */
      .grid-overlay {
        position: absolute;
        inset: 0;
        overflow: hidden;
        opacity: 0.05;
        pointer-events: none;
      }

      .grid-overlay::before {
        content: "";
        position: absolute;
        bottom: 0;
        left: -50%;
        width: 200%;
        height: 60%;
        background:
          repeating-linear-gradient(
            90deg,
            #8b5cf6 0px,
            transparent 1px,
            transparent 60px
          ),
          repeating-linear-gradient(
            0deg,
            #8b5cf6 0px,
            transparent 1px,
            transparent 40px
          );
        transform: perspective(400px) rotateX(55deg);
        transform-origin: center bottom;
        mask-image: linear-gradient(
          to top,
          rgba(0, 0, 0, 0.6) 0%,
          transparent 80%
        );
        -webkit-mask-image: linear-gradient(
          to top,
          rgba(0, 0, 0, 0.6) 0%,
          transparent 80%
        );
      }

      /* ── Floating particles ── */
      .particle {
        position: absolute;
        width: 2px;
        height: 2px;
        border-radius: 50%;
        background: #e2e8f0;
        pointer-events: none;
      }

      .particle--1 {
        left: 10%;
        bottom: -5%;
        opacity: 0.25;
        animation: float-up 12s linear infinite;
      }
      .particle--2 {
        left: 22%;
        bottom: -5%;
        opacity: 0.15;
        animation: float-up 16s linear infinite 2s;
        width: 3px;
        height: 3px;
      }
      .particle--3 {
        left: 35%;
        bottom: -5%;
        opacity: 0.3;
        animation: float-up 14s linear infinite 4s;
      }
      .particle--4 {
        left: 48%;
        bottom: -5%;
        opacity: 0.1;
        animation: float-up 18s linear infinite 1s;
        width: 3px;
        height: 3px;
      }
      .particle--5 {
        left: 58%;
        bottom: -5%;
        opacity: 0.2;
        animation: float-up 13s linear infinite 6s;
      }
      .particle--6 {
        left: 70%;
        bottom: -5%;
        opacity: 0.35;
        animation: float-up 17s linear infinite 3s;
      }
      .particle--7 {
        left: 80%;
        bottom: -5%;
        opacity: 0.12;
        animation: float-up 15s linear infinite 5s;
        width: 3px;
        height: 3px;
      }
      .particle--8 {
        left: 88%;
        bottom: -5%;
        opacity: 0.2;
        animation: float-up 19s linear infinite 7s;
      }
      .particle--9 {
        left: 15%;
        bottom: -5%;
        opacity: 0.18;
        animation: float-up 16s linear infinite 9s;
      }
      .particle--10 {
        left: 65%;
        bottom: -5%;
        opacity: 0.22;
        animation: float-up 14s linear infinite 11s;
      }

      @keyframes float-up {
        0% {
          transform: translateY(0) translateX(0);
          opacity: 0;
        }
        10% {
          opacity: var(--p-opacity, 0.2);
        }
        90% {
          opacity: var(--p-opacity, 0.2);
        }
        100% {
          transform: translateY(-110vh) translateX(20px);
          opacity: 0;
        }
      }

      /* ── Main content ── */
      .splash-container {
        text-align: center;
        position: relative;
        z-index: 10;
      }

      /* ── Logo with animated gradient + neon glow ── */
      .logo {
        font-size: 2.8rem;
        font-weight: 800;
        letter-spacing: -0.02em;
        line-height: 1.1;
        background: linear-gradient(
          135deg,
          #6366f1 0%,
          #8b5cf6 35%,
          #06b6d4 70%,
          #6366f1 100%
        );
        background-size: 300% 300%;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        animation: gradient-shift 6s ease-in-out infinite;
        text-shadow: none;
        position: relative;
      }

      /* Neon glow layer behind the text */
      .logo-glow {
        position: relative;
        display: inline-block;
      }

      .logo-glow::after {
        content: "Code Companion";
        position: absolute;
        inset: 0;
        font-size: 2.8rem;
        font-weight: 800;
        letter-spacing: -0.02em;
        line-height: 1.1;
        color: #8b5cf6;
        filter: blur(20px);
        opacity: 0.5;
        z-index: -1;
        animation: glow-pulse 3s ease-in-out infinite;
      }

      @keyframes gradient-shift {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }

      @keyframes glow-pulse {
        0%,
        100% {
          opacity: 0.4;
          filter: blur(20px);
        }
        50% {
          opacity: 0.65;
          filter: blur(25px);
        }
      }

      /* ── Subtitle pill badge ── */
      .subtitle-badge {
        display: inline-block;
        margin-top: 1rem;
        padding: 0.4rem 1.2rem;
        font-size: 0.8rem;
        font-weight: 500;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #c4b5fd;
        background: rgba(99, 102, 241, 0.08);
        border: 1px solid rgba(99, 102, 241, 0.2);
        border-radius: 999px;
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }

      /* ── Progress bar ── */
      .progress-wrapper {
        margin-top: 2.5rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.75rem;
      }

      .progress-track {
        width: 200px;
        height: 3px;
        background: rgba(99, 102, 241, 0.15);
        border-radius: 2px;
        overflow: hidden;
        position: relative;
      }

      .progress-sweep {
        position: absolute;
        top: 0;
        left: -40%;
        width: 40%;
        height: 100%;
        background: linear-gradient(
          90deg,
          transparent,
          #6366f1,
          #06b6d4,
          transparent
        );
        border-radius: 2px;
        animation: sweep 1.8s ease-in-out infinite;
        box-shadow:
          0 0 12px rgba(99, 102, 241, 0.6),
          0 0 4px rgba(6, 182, 212, 0.4);
      }

      @keyframes sweep {
        0% {
          left: -40%;
        }
        100% {
          left: 100%;
        }
      }

      .status-text {
        font-size: 0.8rem;
        color: #94a3b8;
        letter-spacing: 0.04em;
      }

      /* ── Corner branding ── */
      .corner-brand {
        position: absolute;
        bottom: 16px;
        right: 20px;
        font-size: 0.7rem;
        color: #475569;
        letter-spacing: 0.06em;
        z-index: 10;
      }

      /* ── Reduced motion ── */
      @media (prefers-reduced-motion: reduce) {
        .orb,
        .particle,
        .logo,
        .logo-glow::after,
        .progress-sweep {
          animation: none !important;
        }

        .orb {
          opacity: 0.2;
        }

        .logo {
          background-position: 0% 50%;
        }

        .logo-glow::after {
          opacity: 0.4;
          filter: blur(20px);
        }

        .progress-sweep {
          left: 30%;
          opacity: 0.8;
        }

        .particle {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <!-- Background orbs -->
    <div class="orb orb--1"></div>
    <div class="orb orb--2"></div>
    <div class="orb orb--3"></div>

    <!-- Perspective grid -->
    <div class="grid-overlay"></div>

    <!-- Floating particles -->
    <div class="particle particle--1"></div>
    <div class="particle particle--2"></div>
    <div class="particle particle--3"></div>
    <div class="particle particle--4"></div>
    <div class="particle particle--5"></div>
    <div class="particle particle--6"></div>
    <div class="particle particle--7"></div>
    <div class="particle particle--8"></div>
    <div class="particle particle--9"></div>
    <div class="particle particle--10"></div>

    <!-- Main content -->
    <div class="splash-container">
      <div class="logo-glow">
        <div class="logo">Code Companion</div>
      </div>
      <div><span class="subtitle-badge">Vibe Coder Edition</span></div>
      <div class="progress-wrapper">
        <div class="progress-track">
          <div class="progress-sweep"></div>
        </div>
        <div class="status-text">Initializing&hellip;</div>
      </div>
    </div>

    <!-- Corner branding -->
    <div class="corner-brand">Th3rdAI</div>
  </body>
</html>
