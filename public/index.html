<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Code Companion — PM's Technical Translator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: {
        brand: '#8b5cf6', cyan: '#06b6d4',
        surface: '#1e293b', 'surface-light': '#334155', base: '#0f172a'
      }}}
    }
  </script>
  <style>
    body { background: #0f172a; color: #f8fafc; font-family: system-ui, -apple-system, sans-serif; }
    .code-font { font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace; }
    .fade-in { animation: fadeIn 0.3s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
    .typing-dot { animation: pulse 1.4s infinite; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin 1s linear infinite; }
    .prose h2 { font-size: 1.15rem; font-weight: 700; margin-top: 1.2rem; margin-bottom: 0.5rem; color: #c4b5fd; }
    .prose h3 { font-size: 1rem; font-weight: 600; margin-top: 1rem; margin-bottom: 0.4rem; color: #e2e8f0; }
    .prose p { margin-bottom: 0.6rem; line-height: 1.6; }
    .prose ul, .prose ol { margin-left: 1.2rem; margin-bottom: 0.6rem; }
    .prose li { margin-bottom: 0.3rem; line-height: 1.5; }
    .prose strong { color: #e2e8f0; }
    .prose code { background: #334155; padding: 0.15rem 0.4rem; border-radius: 0.25rem; font-size: 0.85em; }
    .prose pre { background: #1a1a2e; border-radius: 0.5rem; padding: 1rem; overflow-x: auto; margin: 0.75rem 0; }
    .prose pre code { background: none; padding: 0; font-size: 0.85em; }
    .scrollbar-thin::-webkit-scrollbar { width: 6px; }
    .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
    .context-menu { position: fixed; z-index: 60; }
    .drop-zone-active { border-color: #8b5cf6 !important; background: rgba(139, 92, 246, 0.08) !important; }
    /* Accessibility: screen reader only */
    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }
    /* Accessibility: visible focus indicators */
    *:focus-visible { outline: 2px solid #8b5cf6; outline-offset: 2px; border-radius: 4px; }
    button:focus-visible, a:focus-visible { outline: 2px solid #8b5cf6; outline-offset: 2px; }
    /* Improve keyboard skip-to-content */
    .skip-link { position: absolute; top: -40px; left: 0; background: #8b5cf6; color: white; padding: 8px 16px; z-index: 100; transition: top 0.2s; }
    .skip-link:focus { top: 0; }
  </style>
</head>
<body>
  <a href="#chat-input" className="skip-link">Skip to chat input</a>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback, useMemo } = React;

    const MODES = [
      { id: 'explain',        label: 'Explain',     icon: '💡', desc: 'What does this code do?', placeholder: 'Paste code here and I\'ll explain what it does in plain English...' },
      { id: 'bugs',           label: 'Bug Hunter',  icon: '🐛', desc: 'Find issues & risks',     placeholder: 'Paste code here and I\'ll identify potential bugs, security issues, and risks...' },
      { id: 'refactor',       label: 'Refactor',    icon: '✨', desc: 'Improve this code',       placeholder: 'Paste code here and I\'ll suggest improvements with explanations...' },
      { id: 'translate-tech', label: 'Tech → Biz',  icon: '📋', desc: 'Technical to business',   placeholder: 'Paste a technical spec, PR description, or code...\nI\'ll translate it into business language.' },
      { id: 'translate-biz',  label: 'Biz → Tech',  icon: '🔧', desc: 'Business to technical',   placeholder: 'Describe a feature request or product requirement...\nI\'ll produce technical specs.' },
    ];

    function renderMarkdown(text) {
      if (!text) return '';
      try { return marked.parse(text, { breaks: true }); }
      catch { return text; }
    }

    function MarkdownContent({ content }) {
      const ref = useRef(null);
      useEffect(() => {
        if (ref.current) ref.current.querySelectorAll('pre code').forEach(block => hljs.highlightElement(block));
      }, [content]);
      return <div ref={ref} className="prose" dangerouslySetInnerHTML={{ __html: renderMarkdown(content) }} />;
    }

    function TypingIndicator() {
      return (
        <div className="flex items-center gap-1.5 p-3">
          <div className="w-2 h-2 bg-violet-400 rounded-full typing-dot" />
          <div className="w-2 h-2 bg-violet-400 rounded-full typing-dot" />
          <div className="w-2 h-2 bg-violet-400 rounded-full typing-dot" />
        </div>
      );
    }

    function MessageBubble({ role, content }) {
      const isUser = role === 'user';
      return (
        <div className={`fade-in mb-4 flex ${isUser ? 'justify-end' : 'justify-start'}`}>
          <div className={`max-w-[85%] rounded-xl px-4 py-3 ${
            isUser ? 'bg-violet-600/30 border border-violet-500/30' : 'bg-surface border border-slate-700/50'
          }`}>
            {isUser ? (
              <pre className="code-font text-sm whitespace-pre-wrap text-slate-200">{content}</pre>
            ) : (
              <MarkdownContent content={content} />
            )}
          </div>
        </div>
      );
    }

    function CopyButton({ text }) {
      const [copied, setCopied] = useState(false);
      return (
        <button onClick={() => { navigator.clipboard.writeText(text); setCopied(true); setTimeout(() => setCopied(false), 2000); }}
          className="text-xs px-2 py-1 rounded bg-slate-700 hover:bg-slate-600 text-slate-400 transition-colors">
          {copied ? '✓ Copied' : '📋 Copy'}
        </button>
      );
    }

    function Toast({ message, onDone }) {
      useEffect(() => { const t = setTimeout(onDone, 2500); return () => clearTimeout(t); }, []);
      return (
        <div role="status" aria-live="polite" className="fixed bottom-6 right-6 z-50 bg-slate-700 text-slate-200 text-sm px-4 py-2.5 rounded-xl border border-slate-600 shadow-lg fade-in">
          {message}
        </div>
      );
    }

    function ContextMenu({ x, y, items, onClose }) {
      const ref = useRef(null);
      useEffect(() => {
        function handleClick(e) { if (ref.current && !ref.current.contains(e.target)) onClose(); }
        document.addEventListener('mousedown', handleClick);
        return () => document.removeEventListener('mousedown', handleClick);
      }, [onClose]);
      return (
        <div ref={ref} className="context-menu bg-slate-800 border border-slate-600 rounded-xl shadow-2xl py-1 min-w-[180px]" style={{ left: x, top: y }}>
          {items.map((item, i) => item.divider ? (
            <div key={i} className="border-t border-slate-700 my-1" />
          ) : (
            <button key={i} onClick={() => { item.action(); onClose(); }}
              className={`w-full text-left px-4 py-2 text-sm transition-colors flex items-center gap-2.5
                ${item.danger ? 'text-red-400 hover:bg-red-500/10' : 'text-slate-300 hover:bg-slate-700'}`}>
              <span className="w-5 text-center">{item.icon}</span>{item.label}
            </button>
          ))}
        </div>
      );
    }

    function RenameModal({ currentName, onSave, onClose }) {
      const [name, setName] = useState(currentName);
      const inputRef = useRef(null);
      useEffect(() => { inputRef.current?.select(); }, []);
      useEffect(() => {
        function handleEsc(e) { if (e.key === 'Escape') onClose(); }
        document.addEventListener('keydown', handleEsc);
        return () => document.removeEventListener('keydown', handleEsc);
      }, [onClose]);
      return (
        <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4" onClick={onClose} role="presentation">
          <div className="bg-surface rounded-2xl w-full max-w-sm p-6 border border-slate-700" onClick={e => e.stopPropagation()} role="dialog" aria-label="Rename conversation" aria-modal="true">
            <h3 className="text-base font-bold text-slate-100 mb-4">Rename Conversation</h3>
            <label htmlFor="rename-input" className="sr-only">Conversation name</label>
            <input id="rename-input" ref={inputRef} type="text" value={name} onChange={e => setName(e.target.value)}
              onKeyDown={e => { if (e.key === 'Enter') { onSave(name); onClose(); } if (e.key === 'Escape') onClose(); }}
              className="w-full bg-slate-800 text-slate-100 rounded-lg px-4 py-2.5 outline-none border border-slate-600 focus:border-violet-500 focus:ring-2 focus:ring-violet-500/30 text-sm mb-4" />
            <div className="flex gap-2 justify-end">
              <button onClick={onClose} className="px-4 py-2 bg-slate-700 hover:bg-slate-600 text-slate-300 rounded-lg text-sm">Cancel</button>
              <button onClick={() => { onSave(name); onClose(); }} className="px-4 py-2 bg-violet-600 hover:bg-violet-700 text-white rounded-lg text-sm font-medium">Save</button>
            </div>
          </div>
        </div>
      );
    }

    // ── Settings Panel (with project folder) ─────────
    function SettingsPanel({ ollamaUrl, projectFolder, onSave, onClose }) {
      const [url, setUrl] = useState(ollamaUrl);
      const [folder, setFolder] = useState(projectFolder || '');
      const [testing, setTesting] = useState(false);
      const [testResult, setTestResult] = useState(null);
      const [folderResult, setFolderResult] = useState(null);

      async function handleTest() {
        setTesting(true); setTestResult(null);
        try {
          await fetch('/api/config', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ ollamaUrl: url }) });
          const res = await fetch('/api/models');
          const data = await res.json();
          setTestResult(data.connected ? { ok: true, count: data.models.length } : { ok: false, error: data.detail || 'Cannot connect' });
        } catch (err) { setTestResult({ ok: false, error: err.message }); }
        setTesting(false);
      }

      async function handleTestFolder() {
        setFolderResult(null);
        if (!folder.trim()) { setFolderResult({ ok: false, error: 'Enter a folder path' }); return; }
        try {
          const res = await fetch('/api/config', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ projectFolder: folder }) });
          const data = await res.json();
          if (data.error) { setFolderResult({ ok: false, error: data.error }); }
          else {
            const treeRes = await fetch(`/api/files/tree?path=${encodeURIComponent(folder)}&depth=1`);
            const treeData = await treeRes.json();
            if (treeData.tree) { setFolderResult({ ok: true, count: treeData.tree.length }); }
            else { setFolderResult({ ok: false, error: treeData.error || 'Cannot read folder' }); }
          }
        } catch (err) { setFolderResult({ ok: false, error: err.message }); }
      }

      return (
        <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4" onClick={onClose} role="presentation">
          <div className="bg-surface rounded-2xl w-full max-w-lg p-6 border border-slate-700 max-h-[90vh] overflow-y-auto" onClick={e => e.stopPropagation()} role="dialog" aria-label="Settings" aria-modal="true">
            <div className="flex items-center justify-between mb-6">
              <h2 className="text-lg font-bold text-slate-100">Settings</h2>
              <button onClick={onClose} className="text-slate-400 hover:text-white text-xl" aria-label="Close settings">✕</button>
            </div>

            {/* Ollama URL */}
            <div className="mb-5">
              <label className="block text-sm text-slate-300 mb-2 font-medium">Ollama Server URL</label>
              <div className="flex gap-2">
                <input type="text" value={url} onChange={e => setUrl(e.target.value)} placeholder="http://localhost:11434"
                  className="flex-1 bg-slate-800 text-slate-100 rounded-lg px-4 py-2.5 outline-none border border-slate-600 focus:border-violet-500 code-font text-sm" />
                <button onClick={handleTest} disabled={testing}
                  className="bg-cyan-600 hover:bg-cyan-700 disabled:bg-slate-700 text-white rounded-lg px-4 py-2.5 text-sm font-medium transition-colors whitespace-nowrap">
                  {testing ? <span className="inline-block spin">&#x27F3;</span> : 'Test Connection'}
                </button>
              </div>
              {testResult && (
                <div className={`mt-2 p-2.5 rounded-lg text-xs ${testResult.ok ? 'bg-green-500/10 border border-green-500/30 text-green-400' : 'bg-red-500/10 border border-red-500/30 text-red-400'}`}>
                  {testResult.ok ? `Connected! Found ${testResult.count} model${testResult.count !== 1 ? 's' : ''}.` : `Failed: ${testResult.error}`}
                </div>
              )}
            </div>

            {/* Project Folder */}
            <div className="mb-5">
              <label className="block text-sm text-slate-300 mb-2 font-medium">Project Folder</label>
              <div className="flex gap-2">
                <input type="text" value={folder} onChange={e => setFolder(e.target.value)} placeholder="/Users/you/projects/my-app"
                  className="flex-1 bg-slate-800 text-slate-100 rounded-lg px-4 py-2.5 outline-none border border-slate-600 focus:border-violet-500 code-font text-sm" />
                <button onClick={handleTestFolder}
                  className="bg-cyan-600 hover:bg-cyan-700 text-white rounded-lg px-4 py-2.5 text-sm font-medium transition-colors whitespace-nowrap">
                  Set Folder
                </button>
              </div>
              <p className="text-xs text-slate-400 mt-1.5">Full path to a repo or folder. Opens the file browser panel.</p>
              {folderResult && (
                <div className={`mt-2 p-2.5 rounded-lg text-xs ${folderResult.ok ? 'bg-green-500/10 border border-green-500/30 text-green-400' : 'bg-red-500/10 border border-red-500/30 text-red-400'}`}>
                  {folderResult.ok ? `Found ${folderResult.count} items in folder.` : `Error: ${folderResult.error}`}
                </div>
              )}
            </div>

            <div className="mb-5 p-3 bg-slate-800 rounded-lg text-xs text-slate-400">
              <strong className="text-slate-300">Quick help:</strong>
              <ul className="mt-1.5 space-y-1">
                <li>Same machine Ollama: <code className="bg-slate-700 px-1.5 py-0.5 rounded">http://localhost:11434</code></li>
                <li>Network Ollama: <code className="bg-slate-700 px-1.5 py-0.5 rounded">http://192.168.x.x:11434</code></li>
                <li>Project folder example: <code className="bg-slate-700 px-1.5 py-0.5 rounded">~/projects/my-app</code></li>
              </ul>
            </div>

            <div className="flex gap-2 justify-end">
              <button onClick={onClose} className="px-4 py-2 bg-slate-700 hover:bg-slate-600 text-slate-300 rounded-lg text-sm transition-colors">Cancel</button>
              <button onClick={async () => { await onSave(url, folder); onClose(); }}
                className="px-4 py-2 bg-violet-600 hover:bg-violet-700 text-white rounded-lg text-sm font-medium transition-colors">
                Save &amp; Close
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ── File Tree Node ───────────────────────────────
    function FileTreeNode({ node, depth, onFileClick }) {
      const [open, setOpen] = useState(depth < 2);
      const indent = depth * 16;

      if (node.type === 'dir') {
        return (
          <div role="treeitem" aria-expanded={open} aria-label={`Folder: ${node.name}`}>
            <button className="w-full flex items-center gap-1 py-1.5 px-2 hover:bg-slate-700/50 rounded cursor-pointer text-sm text-slate-300 focus:outline-none focus:ring-2 focus:ring-violet-500/40 focus:bg-slate-700/30"
              style={{ paddingLeft: indent }}
              onClick={() => setOpen(!open)}
              onKeyDown={e => { if (e.key === 'ArrowRight' && !open) setOpen(true); if (e.key === 'ArrowLeft' && open) setOpen(false); }}>
              <span className="text-xs text-slate-400" aria-hidden="true">{open ? '▾' : '▸'}</span>
              <span className="text-amber-400 text-xs" aria-hidden="true">📁</span>
              <span className="truncate">{node.name}</span>
            </button>
            {open && <div role="group">{node.children?.map((child, i) => (
              <FileTreeNode key={child.path || i} node={child} depth={depth + 1} onFileClick={onFileClick} />
            ))}</div>}
          </div>
        );
      }

      const extColors = { js: 'text-yellow-400', jsx: 'text-cyan-400', ts: 'text-blue-400', tsx: 'text-blue-300',
        py: 'text-green-400', json: 'text-amber-300', md: 'text-slate-300', css: 'text-pink-400',
        html: 'text-orange-400', sh: 'text-green-300' };
      const extColor = extColors[node.ext] || 'text-slate-400';

      return (
        <button role="treeitem" className="w-full flex items-center gap-1.5 py-1.5 px-2 hover:bg-slate-700/50 rounded cursor-pointer text-sm group focus:outline-none focus:ring-2 focus:ring-violet-500/40 focus:bg-slate-700/30"
          style={{ paddingLeft: indent }}
          onClick={() => onFileClick(node)}
          aria-label={`File: ${node.name}`}>
          <span className={`text-xs ${extColor}`} aria-hidden="true">📄</span>
          <span className="truncate text-slate-300 group-hover:text-white">{node.name}</span>
          {node.size > 0 && <span className="text-[10px] text-slate-500 ml-auto" aria-label={`${(node.size / 1024).toFixed(0)} kilobytes`}>{(node.size / 1024).toFixed(0)}k</span>}
        </button>
      );
    }

    // ── File Browser Panel (right sidebar) ───────────
    function FileBrowser({ projectFolder, onAttachFile, onClose }) {
      const [tree, setTree] = useState(null);
      const [loading, setLoading] = useState(false);
      const [preview, setPreview] = useState(null);
      const [loadingFile, setLoadingFile] = useState(false);

      useEffect(() => { if (projectFolder) loadTree(); }, [projectFolder]);

      async function loadTree() {
        setLoading(true);
        try {
          const res = await fetch(`/api/files/tree?depth=3`);
          const data = await res.json();
          setTree(data);
        } catch {}
        setLoading(false);
      }

      async function handleFileClick(node) {
        setLoadingFile(true);
        try {
          const res = await fetch(`/api/files/read?path=${encodeURIComponent(node.path)}`);
          const data = await res.json();
          setPreview(data);
        } catch {}
        setLoadingFile(false);
      }

      function handleAttach() {
        if (preview) {
          onAttachFile({ name: preview.name, path: preview.path, content: preview.content, lines: preview.lines });
          setPreview(null);
        }
      }

      return (
        <div className="w-80 bg-surface border-l border-slate-700/50 flex flex-col h-full">
          <div className="p-3 border-b border-slate-700/50 flex items-center gap-2">
            <span className="text-sm font-medium text-slate-200 flex-1">📂 File Browser</span>
            <button onClick={loadTree} className="text-slate-400 hover:text-white text-sm" title="Refresh">&#x27F3;</button>
            <button onClick={onClose} className="text-slate-400 hover:text-white text-sm" title="Close">✕</button>
          </div>

          {!projectFolder && (
            <div className="flex-1 flex items-center justify-center p-4">
              <p className="text-sm text-slate-500 text-center">Set a project folder in Settings to browse files</p>
            </div>
          )}

          {projectFolder && loading && (
            <div className="flex-1 flex items-center justify-center">
              <span className="text-slate-400 text-sm">Loading...</span>
            </div>
          )}

          {projectFolder && tree && !preview && (
            <div className="flex-1 overflow-y-auto scrollbar-thin p-1">
              <div className="px-2 py-1 text-[10px] text-slate-500 truncate">{tree.root}</div>
              <div role="tree" aria-label="Project files">
                {tree.tree?.map((node, i) => (
                  <FileTreeNode key={node.path || i} node={node} depth={0} onFileClick={handleFileClick} />
                ))}
              </div>
              {tree.tree?.length === 0 && <p className="text-sm text-slate-400 text-center py-4">No text files found in this folder. Try a different project folder in Settings.</p>}
            </div>
          )}

          {preview && (
            <div className="flex-1 flex flex-col overflow-hidden">
              <div className="px-3 py-2 border-b border-slate-700/50 flex items-center gap-2">
                <button onClick={() => setPreview(null)} className="text-slate-400 hover:text-white text-xs">← Back</button>
                <span className="text-sm text-slate-200 truncate flex-1">{preview.name}</span>
                <span className="text-[10px] text-slate-500">{preview.lines} lines</span>
              </div>
              <div className="flex-1 overflow-auto p-3">
                <pre className="code-font text-xs text-slate-300 whitespace-pre-wrap">{preview.content}</pre>
              </div>
              <div className="p-2 border-t border-slate-700/50">
                <button onClick={handleAttach}
                  className="w-full bg-violet-600 hover:bg-violet-700 text-white text-sm rounded-lg py-2 font-medium transition-colors">
                  + Attach to Chat
                </button>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ── Attached file chips ──────────────────────────
    function AttachedFiles({ files, onRemove }) {
      if (files.length === 0) return null;
      return (
        <div className="flex flex-wrap gap-1.5 mb-2">
          {files.map((f, i) => (
            <div key={i} className="flex items-center gap-1.5 bg-violet-600/15 border border-violet-500/30 rounded-lg px-2.5 py-1 text-xs">
              <span className="text-violet-400">📄</span>
              <span className="text-slate-300 max-w-[120px] truncate">{f.name}</span>
              <span className="text-slate-600">{f.lines ? `${f.lines}L` : ''}</span>
              <button onClick={() => onRemove(i)} className="text-slate-500 hover:text-red-400 ml-0.5" aria-label={`Remove ${f.name}`}>✕</button>
            </div>
          ))}
        </div>
      );
    }

    // ── Sidebar ─────────────────────────────────────
    function Sidebar({ history, activeId, onSelect, onNew, onDelete, onRename, onExport, onArchive, open, onClose, showArchived, onToggleArchived }) {
      const [search, setSearch] = useState('');
      const [contextMenu, setContextMenu] = useState(null);

      const filtered = useMemo(() => {
        let list = history.filter(h => showArchived ? h.archived : !h.archived);
        if (search.trim()) {
          const q = search.toLowerCase();
          list = list.filter(h => (h.title || '').toLowerCase().includes(q) || (h.mode || '').toLowerCase().includes(q) || (h.model || '').toLowerCase().includes(q));
        }
        return list;
      }, [history, search, showArchived]);

      function handleContextMenu(e, h) {
        e.preventDefault();
        setContextMenu({ x: e.clientX, y: e.clientY, items: [
          { icon: '✏️', label: 'Rename', action: () => onRename(h.id) },
          { icon: '📥', label: 'Export as Markdown', action: () => onExport(h.id, 'md') },
          { icon: '📄', label: 'Export as Text', action: () => onExport(h.id, 'txt') },
          { divider: true },
          h.archived ? { icon: '📂', label: 'Unarchive', action: () => onArchive(h.id, false) }
                     : { icon: '📦', label: 'Archive', action: () => onArchive(h.id, true) },
          { divider: true },
          { icon: '🗑️', label: 'Delete', action: () => onDelete(h.id), danger: true },
        ]});
      }

      return (
        <>
          {open && <div className="fixed inset-0 bg-black/50 z-30 lg:hidden" onClick={onClose} />}
          <nav aria-label="Conversations" className={`fixed lg:relative top-0 left-0 h-full w-72 bg-surface border-r border-slate-700/50 z-40 flex flex-col transition-transform duration-200
            ${open ? 'translate-x-0' : '-translate-x-full lg:translate-x-0'}`}>
            <div className="p-4 border-b border-slate-700/50 space-y-2">
              <button onClick={onNew} className="w-full bg-violet-600 hover:bg-violet-700 text-white rounded-lg py-2.5 px-4 font-medium transition-colors focus:outline-none focus:ring-2 focus:ring-violet-400">+ New Conversation</button>
              <label htmlFor="sidebar-search" className="sr-only">Search conversations</label>
              <input id="sidebar-search" type="text" value={search} onChange={e => setSearch(e.target.value)} placeholder="Search chats..."
                className="w-full bg-slate-800 text-slate-200 text-sm rounded-lg px-3 py-2 outline-none border border-slate-700 focus:border-violet-500 focus:ring-2 focus:ring-violet-500/30 placeholder-slate-500" />
            </div>
            <div className="px-4 pt-2 pb-1 flex items-center gap-2">
              <button onClick={onToggleArchived}
                className={`text-xs px-2.5 py-1 rounded-lg transition-colors ${showArchived ? 'bg-violet-600/20 text-violet-300 border border-violet-500/30' : 'text-slate-500 hover:text-slate-300 hover:bg-slate-700/50'}`}>
                {showArchived ? '📦 Archived' : '💬 Active'}
              </button>
              <span className="text-xs text-slate-600">{filtered.length} chat{filtered.length !== 1 ? 's' : ''}</span>
            </div>
            <div className="flex-1 overflow-y-auto scrollbar-thin p-2">
              {filtered.length === 0 && <p className="text-center text-slate-400 text-sm py-8">{search ? 'No chats match your search. Try different keywords.' : showArchived ? 'No archived chats yet. Right-click a chat to archive it.' : 'No conversations yet. Click "+ New Conversation" to start.'}</p>}
              {filtered.map(h => (
                <div key={h.id}
                  className={`group flex items-center gap-2 rounded-lg px-3 py-2.5 mb-1 cursor-pointer transition-colors
                    ${activeId === h.id ? 'bg-violet-600/20 border border-violet-500/30' : 'hover:bg-slate-700/50'}`}
                  onClick={() => { onSelect(h.id); onClose(); }}
                  onContextMenu={(e) => handleContextMenu(e, h)}>
                  <span className="text-sm">{MODES.find(m => m.id === h.mode)?.icon || '💬'}</span>
                  <div className="flex-1 min-w-0">
                    <div className="text-sm text-slate-200 truncate">{h.title || 'Untitled'}</div>
                    <div className="text-xs text-slate-500">
                      {h.model && <span className="text-violet-400">{h.model.split(':')[0]}</span>}
                      {h.model && ' · '}{new Date(h.createdAt).toLocaleDateString()}
                    </div>
                  </div>
                  <button onClick={(e) => { e.stopPropagation(); handleContextMenu(e, h); }}
                    className="opacity-0 group-hover:opacity-100 text-slate-500 hover:text-slate-300 text-xs transition-opacity px-1" aria-label="More options">⋯</button>
                </div>
              ))}
            </div>
          </nav>
          {contextMenu && <ContextMenu x={contextMenu.x} y={contextMenu.y} items={contextMenu.items} onClose={() => setContextMenu(null)} />}
        </>
      );
    }

    // ── Main App ────────────────────────────────────
    function App() {
      const [models, setModels] = useState([]);
      const [selectedModel, setSelectedModel] = useState('');
      const [connected, setConnected] = useState(false);
      const [ollamaUrl, setOllamaUrl] = useState('');
      const [projectFolder, setProjectFolder] = useState('');
      const [mode, setMode] = useState('explain');
      const [input, setInput] = useState('');
      const [messages, setMessages] = useState([]);
      const [streaming, setStreaming] = useState(false);
      const [history, setHistory] = useState([]);
      const [activeConvId, setActiveConvId] = useState(null);
      const [sidebarOpen, setSidebarOpen] = useState(false);
      const [showSettings, setShowSettings] = useState(false);
      const [showFileBrowser, setShowFileBrowser] = useState(false);
      const [showArchived, setShowArchived] = useState(false);
      const [renaming, setRenaming] = useState(null);
      const [stats, setStats] = useState(null);
      const [refreshing, setRefreshing] = useState(false);
      const [toast, setToast] = useState(null);
      const [attachedFiles, setAttachedFiles] = useState([]);
      const [dragging, setDragging] = useState(false);
      const messagesEndRef = useRef(null);
      const textareaRef = useRef(null);
      const fileInputRef = useRef(null);
      const dragCounter = useRef(0);

      useEffect(() => { messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages, streaming]);
      useEffect(() => { fetchConfig(); fetchModels(); fetchHistory(); }, []);

      function showToast(msg) { setToast(msg); }

      async function fetchConfig() {
        try {
          const res = await fetch('/api/config');
          const data = await res.json();
          setOllamaUrl(data.ollamaUrl || '');
          setProjectFolder(data.projectFolder || '');
        } catch {}
      }

      async function fetchModels() {
        setRefreshing(true);
        try {
          const res = await fetch('/api/models');
          const data = await res.json();
          if (data.models) {
            setModels(data.models); setConnected(true); setOllamaUrl(data.ollamaUrl || '');
            if (data.models.length > 0 && !selectedModel) setSelectedModel(data.models[0].name);
          } else { setConnected(false); setOllamaUrl(data.ollamaUrl || ''); }
        } catch { setConnected(false); }
        setRefreshing(false);
      }

      async function fetchHistory() {
        try { const res = await fetch('/api/history'); setHistory(await res.json()); } catch {}
      }

      async function handleSaveSettings(newUrl, newFolder) {
        try {
          await fetch('/api/config', { method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ ollamaUrl: newUrl, projectFolder: newFolder }) });
          setOllamaUrl(newUrl);
          setProjectFolder(newFolder);
          await fetchModels();
          if (newFolder) setShowFileBrowser(true);
        } catch {}
      }

      async function loadConversation(id) {
        try {
          const res = await fetch(`/api/history/${id}`);
          const conv = await res.json();
          setMessages(conv.messages || []); setMode(conv.mode || 'explain'); setActiveConvId(conv.id);
          if (conv.model) setSelectedModel(conv.model);
          setAttachedFiles([]);
        } catch {}
      }

      async function saveConversation(msgs, convMode, overrides = {}) {
        const title = overrides.title || msgs[0]?.content?.slice(0, 60) || 'Untitled';
        const conv = { id: activeConvId || undefined, title, mode: convMode || mode, model: selectedModel, messages: msgs, ...overrides };
        if (activeConvId) { const existing = history.find(h => h.id === activeConvId); if (existing) { conv.createdAt = existing.createdAt; if (existing.archived) conv.archived = existing.archived; } }
        else { conv.createdAt = new Date().toISOString(); }
        try { const res = await fetch('/api/history', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(conv) }); const { id } = await res.json(); setActiveConvId(id); fetchHistory(); } catch {}
      }

      async function deleteConversation(id) {
        try { await fetch(`/api/history/${id}`, { method: 'DELETE' }); if (activeConvId === id) { setMessages([]); setActiveConvId(null); } fetchHistory(); showToast('Conversation deleted'); } catch {}
      }
      async function renameConversation(id, newTitle) {
        try { const res = await fetch(`/api/history/${id}`); const conv = await res.json(); conv.title = newTitle; await fetch('/api/history', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(conv) }); fetchHistory(); showToast('Renamed'); } catch {}
      }
      async function archiveConversation(id, archive) {
        try { const res = await fetch(`/api/history/${id}`); const conv = await res.json(); conv.archived = archive; await fetch('/api/history', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(conv) }); if (activeConvId === id && archive) { setMessages([]); setActiveConvId(null); } fetchHistory(); showToast(archive ? 'Archived' : 'Unarchived'); } catch {}
      }
      async function exportConversation(id, format) {
        try {
          const res = await fetch(`/api/history/${id}`); const conv = await res.json();
          let content = ''; const title = conv.title || 'Untitled'; const modeLabel = MODES.find(m => m.id === conv.mode)?.label || conv.mode;
          if (format === 'md') {
            content = `# ${title}\n\n**Mode:** ${modeLabel}  \n**Model:** ${conv.model || 'N/A'}  \n**Date:** ${new Date(conv.createdAt).toLocaleString()}  \n\n---\n\n`;
            (conv.messages || []).forEach(m => { content += m.role === 'user' ? `## You\n\n\`\`\`\n${m.content}\n\`\`\`\n\n` : `## Assistant\n\n${m.content}\n\n---\n\n`; });
          } else {
            content = `${title}\nMode: ${modeLabel} | Model: ${conv.model || 'N/A'} | Date: ${new Date(conv.createdAt).toLocaleString()}\n${'='.repeat(60)}\n\n`;
            (conv.messages || []).forEach(m => { content += `[${m.role === 'user' ? 'YOU' : 'ASSISTANT'}]\n${m.content}\n\n${'-'.repeat(40)}\n\n`; });
          }
          const blob = new Blob([content], { type: 'text/plain' }); const url = URL.createObjectURL(blob);
          const a = document.createElement('a'); a.href = url; a.download = `${title.replace(/[^a-z0-9]/gi, '_').slice(0, 40)}.${format}`; a.click(); URL.revokeObjectURL(url);
          showToast(`Exported as .${format}`);
        } catch {}
      }
      function handleRenameRequest(id) { const h = history.find(c => c.id === id); if (h) setRenaming({ id, title: h.title || 'Untitled' }); }

      function startNew() { setMessages([]); setActiveConvId(null); setStats(null); setInput(''); setAttachedFiles([]); }

      // ── Build message with attached files ──
      function buildUserContent(text, files) {
        if (files.length === 0) return text;
        let content = text.trim() ? text + '\n\n' : '';
        files.forEach(f => {
          content += `--- File: ${f.name}${f.path ? ' (' + f.path + ')' : ''} ---\n\`\`\`\n${f.content}\n\`\`\`\n\n`;
        });
        return content;
      }

      async function handleSend() {
        if ((!input.trim() && attachedFiles.length === 0) || streaming || !selectedModel) return;
        const content = buildUserContent(input.trim(), attachedFiles);
        const userMsg = { role: 'user', content };
        const newMessages = [...messages, userMsg];
        setMessages(newMessages); setInput(''); setAttachedFiles([]); setStreaming(true); setStats(null);

        try {
          const res = await fetch('/api/chat', { method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ model: selectedModel, mode, messages: newMessages.map(m => ({ role: m.role, content: m.content })) }) });
          const reader = res.body.getReader(); const decoder = new TextDecoder();
          let assistantContent = ''; let buffer = '';
          while (true) {
            const { done, value } = await reader.read(); if (done) break;
            buffer += decoder.decode(value, { stream: true }); const lines = buffer.split('\n'); buffer = lines.pop();
            for (const line of lines) {
              if (!line.startsWith('data: ')) continue; const payload = line.slice(6); if (payload === '[DONE]') break;
              try {
                const parsed = JSON.parse(payload);
                if (parsed.token) { assistantContent += parsed.token; setMessages([...newMessages, { role: 'assistant', content: assistantContent }]); }
                if (parsed.done) { setStats({ tokens: parsed.eval_count, duration: parsed.total_duration ? (parsed.total_duration / 1e9).toFixed(1) : null }); }
                if (parsed.error) { assistantContent += `\n\nError: ${parsed.error}`; setMessages([...newMessages, { role: 'assistant', content: assistantContent }]); }
              } catch {}
            }
          }
          const finalMessages = [...newMessages, { role: 'assistant', content: assistantContent }];
          setMessages(finalMessages); saveConversation(finalMessages, mode);
        } catch (err) { setMessages([...newMessages, { role: 'assistant', content: `Something went wrong connecting to Ollama. Check that Ollama is running and try again.\n\nTechnical detail: ${err.message}` }]); }
        finally { setStreaming(false); }
      }

      function handleKeyDown(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } }

      // ── File handling ──
      function attachFile(fileData) {
        setAttachedFiles(prev => [...prev, fileData]);
        showToast(`Attached: ${fileData.name}`);
      }
      function removeAttachedFile(index) { setAttachedFiles(prev => prev.filter((_, i) => i !== index)); }

      // File upload via button
      function handleFileUpload(e) {
        const files = Array.from(e.target.files);
        files.forEach(file => {
          const reader = new FileReader();
          reader.onload = (ev) => {
            attachFile({ name: file.name, content: ev.target.result, lines: ev.target.result.split('\n').length });
          };
          reader.readAsText(file);
        });
        e.target.value = '';
      }

      // Drag and drop
      function handleDragEnter(e) { e.preventDefault(); dragCounter.current++; setDragging(true); }
      function handleDragLeave(e) { e.preventDefault(); dragCounter.current--; if (dragCounter.current === 0) setDragging(false); }
      function handleDragOver(e) { e.preventDefault(); }
      function handleDrop(e) {
        e.preventDefault(); dragCounter.current = 0; setDragging(false);
        const files = Array.from(e.dataTransfer.files);
        files.forEach(file => {
          const reader = new FileReader();
          reader.onload = (ev) => {
            attachFile({ name: file.name, content: ev.target.result, lines: ev.target.result.split('\n').length });
          };
          reader.readAsText(file);
        });
      }

      // Toolbar actions
      async function handlePaste() {
        try { const text = await navigator.clipboard.readText(); setInput(prev => prev + text); textareaRef.current?.focus(); showToast('Pasted from clipboard'); }
        catch { showToast('Clipboard access denied'); }
      }
      function handleCopyLastResponse() {
        const lastAssistant = [...messages].reverse().find(m => m.role === 'assistant');
        if (lastAssistant) { navigator.clipboard.writeText(lastAssistant.content); showToast('Response copied'); }
        else { showToast('No response to copy'); }
      }
      function handleClearInput() { setInput(''); setAttachedFiles([]); textareaRef.current?.focus(); }

      const currentMode = MODES.find(m => m.id === mode);

      return (
        <div className="h-screen flex">
          <Sidebar history={history} activeId={activeConvId} onSelect={loadConversation} onNew={startNew}
            onDelete={deleteConversation} onRename={handleRenameRequest} onExport={exportConversation}
            onArchive={archiveConversation} open={sidebarOpen} onClose={() => setSidebarOpen(false)}
            showArchived={showArchived} onToggleArchived={() => setShowArchived(!showArchived)} />

          <main className="flex-1 flex flex-col min-w-0"
            onDragEnter={handleDragEnter} onDragLeave={handleDragLeave} onDragOver={handleDragOver} onDrop={handleDrop}>

            {/* Header */}
            <header className="bg-surface/80 backdrop-blur border-b border-slate-700/50 px-4 py-3 flex items-center gap-3">
              <button onClick={() => setSidebarOpen(!sidebarOpen)} className="lg:hidden text-slate-400 hover:text-white text-xl" aria-label="Toggle sidebar">&#9776;</button>
              <div className="flex-1 min-w-0">
                <h1 className="text-lg font-bold text-slate-100">Code Companion</h1>
                <p className="text-xs text-slate-400 truncate">PM's Technical Translator</p>
              </div>
              <div className="flex items-center gap-2">
                <button onClick={() => setShowFileBrowser(!showFileBrowser)}
                  className={`flex items-center gap-1 text-xs px-2.5 py-1.5 rounded-lg border transition-colors
                    ${showFileBrowser ? 'text-violet-300 border-violet-500/30 bg-violet-600/10' : 'text-slate-400 border-slate-600 hover:bg-slate-700/50'}`}
                  title="File Browser">
                  📂 Files
                </button>
                <button onClick={() => setShowSettings(true)}
                  className={`flex items-center gap-1.5 text-xs px-2.5 py-1.5 rounded-lg border transition-colors ${
                    connected ? 'text-green-400 border-green-500/30 hover:bg-green-500/10' : 'text-red-400 border-red-500/30 hover:bg-red-500/10'
                  }`}>
                  <div className={`w-2 h-2 rounded-full ${connected ? 'bg-green-400' : 'bg-red-400'}`} />
                  {connected ? `${models.length} model${models.length !== 1 ? 's' : ''}` : 'Offline'}
                  <span className="text-slate-500 ml-0.5">&#9881;</span>
                </button>
                <button onClick={fetchModels} disabled={refreshing}
                  className="text-slate-400 hover:text-white text-sm px-2 py-1.5 rounded-lg hover:bg-slate-700 transition-colors disabled:opacity-50" title="Refresh models">
                  <span className={refreshing ? 'inline-block spin' : ''}>&#x27F3;</span>
                </button>
                <label htmlFor="model-select" className="sr-only">Select AI model</label>
                <select id="model-select" value={selectedModel} onChange={e => setSelectedModel(e.target.value)}
                  className="bg-slate-700 text-slate-200 text-sm rounded-lg px-3 py-1.5 outline-none border border-slate-600 focus:border-violet-500 focus:ring-2 focus:ring-violet-500/30 max-w-[200px]">
                  {models.length === 0 && <option value="">No models found</option>}
                  {models.map(m => <option key={m.name} value={m.name}>{m.name} ({m.paramSize || m.size + 'GB'})</option>)}
                </select>
              </div>
            </header>

            {/* Offline Banner */}
            {!connected && (
              <div className="bg-amber-500/10 border-b border-amber-500/30 px-4 py-3 flex items-center gap-3">
                <span className="text-amber-400 text-sm">&#9888;</span>
                <div className="flex-1 text-sm text-amber-300">Can't reach Ollama at <code className="bg-amber-500/10 px-1.5 py-0.5 rounded text-xs">{ollamaUrl}</code>. Make sure Ollama is running.</div>
                <button onClick={() => setShowSettings(true)} className="text-xs bg-amber-500/20 hover:bg-amber-500/30 text-amber-300 px-3 py-1.5 rounded-lg transition-colors">Configure</button>
                <button onClick={fetchModels} className="text-xs bg-slate-700 hover:bg-slate-600 text-slate-300 px-3 py-1.5 rounded-lg transition-colors">Retry</button>
              </div>
            )}

            {/* Drag overlay */}
            {dragging && (
              <div className="absolute inset-0 z-20 flex items-center justify-center bg-base/80 border-2 border-dashed border-violet-500 rounded-2xl m-2 pointer-events-none">
                <div className="text-center">
                  <div className="text-4xl mb-2">📄</div>
                  <p className="text-violet-300 font-medium">Drop files here to attach</p>
                </div>
              </div>
            )}

            <div className="flex-1 flex overflow-hidden">
              {/* Main chat area */}
              <div className="flex-1 flex flex-col min-w-0">
                {/* Mode Tabs */}
                <div className="bg-surface/50 border-b border-slate-700/50 px-4 py-2 flex gap-2 overflow-x-auto">
                  {MODES.map(m => (
                    <button key={m.id} onClick={() => setMode(m.id)}
                      className={`flex items-center gap-1.5 px-3 py-2 rounded-lg text-sm whitespace-nowrap transition-all
                        ${mode === m.id ? 'bg-violet-600/30 text-violet-300 border border-violet-500/40 font-medium' : 'text-slate-400 hover:bg-slate-700/50 hover:text-slate-200'}`}>
                      <span>{m.icon}</span><span>{m.label}</span>
                    </button>
                  ))}
                </div>

                {/* Messages */}
                <div className="flex-1 overflow-y-auto scrollbar-thin px-4 py-4" role="log" aria-label="Chat messages" aria-live="polite">
                  {messages.length === 0 && (
                    <div className="h-full flex items-center justify-center">
                      <div className="text-center max-w-md">
                        <div className="text-5xl mb-4">{currentMode?.icon}</div>
                        <h2 className="text-xl font-bold text-slate-200 mb-2">{currentMode?.label}</h2>
                        <p className="text-slate-400 mb-4">{currentMode?.desc}</p>
                        {connected && selectedModel && (
                          <div className="inline-flex items-center gap-2 bg-slate-800 rounded-lg px-3 py-1.5 text-xs text-slate-400 mb-6">
                            <div className="w-2 h-2 bg-green-400 rounded-full" />
                            Using <strong className="text-violet-400">{selectedModel.split(':')[0]}</strong>
                          </div>
                        )}
                        {!connected && (
                          <button onClick={() => setShowSettings(true)}
                            className="mb-6 bg-violet-600 hover:bg-violet-700 text-white text-sm px-4 py-2 rounded-lg transition-colors">Connect to Ollama</button>
                        )}
                        <div className="grid grid-cols-2 gap-2 text-left text-xs">
                          {mode === 'explain' && <><div className="bg-slate-800 rounded-lg p-3"><span className="text-violet-400">Try:</span> Paste a function and ask what it does</div><div className="bg-slate-800 rounded-lg p-3"><span className="text-violet-400">Try:</span> Paste an API endpoint for a summary</div></>}
                          {mode === 'bugs' && <><div className="bg-slate-800 rounded-lg p-3"><span className="text-violet-400">Try:</span> Paste code your team wrote for review</div><div className="bg-slate-800 rounded-lg p-3"><span className="text-violet-400">Try:</span> Check for security issues before launch</div></>}
                          {mode === 'refactor' && <><div className="bg-slate-800 rounded-lg p-3"><span className="text-violet-400">Try:</span> Paste messy code for improvement</div><div className="bg-slate-800 rounded-lg p-3"><span className="text-violet-400">Try:</span> Modernize legacy code snippets</div></>}
                          {(mode === 'translate-tech' || mode === 'translate-biz') && <><div className="bg-slate-800 rounded-lg p-3"><span className="text-violet-400">Try:</span> Translate a PR for stakeholders</div><div className="bg-slate-800 rounded-lg p-3"><span className="text-violet-400">Try:</span> Turn a feature request into specs</div></>}
                        </div>
                      </div>
                    </div>
                  )}
                  {messages.map((msg, i) => (
                    <div key={i} className="relative group">
                      <MessageBubble role={msg.role} content={msg.content} />
                      {msg.role === 'assistant' && !streaming && (
                        <div className="absolute top-2 right-2 opacity-0 group-hover:opacity-100 transition-opacity"><CopyButton text={msg.content} /></div>
                      )}
                    </div>
                  ))}
                  {streaming && messages[messages.length - 1]?.role !== 'assistant' && <TypingIndicator />}
                  <div ref={messagesEndRef} />
                </div>

                {/* Stats */}
                {stats && (
                  <div className="bg-surface/50 border-t border-slate-700/50 px-4 py-1.5 flex items-center gap-4 text-xs text-slate-500">
                    <span>Model: <strong className="text-slate-400">{selectedModel}</strong></span>
                    {stats.tokens && <span>Tokens: {stats.tokens}</span>}
                    {stats.duration && <span>Time: {stats.duration}s</span>}
                  </div>
                )}

                {/* Input */}
                <div className={`bg-surface border-t border-slate-700/50 p-4 ${dragging ? 'drop-zone-active' : ''}`}>
                  <AttachedFiles files={attachedFiles} onRemove={removeAttachedFile} />
                  <div className="flex gap-2">
                    <div className="flex-1 flex flex-col gap-1.5">
                      <label htmlFor="chat-input" className="sr-only">Type your message</label>
                      <textarea id="chat-input" ref={textareaRef} value={input} onChange={e => setInput(e.target.value)} onKeyDown={handleKeyDown}
                        placeholder={connected ? (attachedFiles.length > 0 ? 'Add a message about the attached files, or just hit Send...' : currentMode?.placeholder) : 'Connect to Ollama first (click the status button in the header)...'}
                        rows={4} disabled={streaming || !connected}
                        className="flex-1 bg-slate-800 text-slate-100 code-font text-sm rounded-xl px-4 py-3 outline-none border border-slate-700 focus:border-violet-500 focus:ring-2 focus:ring-violet-500/30 resize-none placeholder-slate-500 disabled:opacity-50" />
                      <div className="flex items-center gap-1.5 pl-1">
                        <input ref={fileInputRef} type="file" multiple accept=".js,.jsx,.ts,.tsx,.py,.json,.md,.txt,.html,.css,.yaml,.yml,.sh,.sql,.go,.rs,.java,.c,.cpp,.h,.toml,.xml,.csv,.env,.svelte,.vue" className="hidden" onChange={handleFileUpload} />
                        <button onClick={() => fileInputRef.current?.click()} title="Upload files to attach"
                          className="text-xs px-2.5 py-1.5 rounded-lg text-slate-400 hover:text-slate-200 hover:bg-slate-700/50 transition-colors focus:outline-none focus:ring-2 focus:ring-violet-500/40">
                          📎 Upload
                        </button>
                        <button onClick={handlePaste} title="Paste text from clipboard"
                          className="text-xs px-2.5 py-1.5 rounded-lg text-slate-400 hover:text-slate-200 hover:bg-slate-700/50 transition-colors focus:outline-none focus:ring-2 focus:ring-violet-500/40">
                          📋 Paste
                        </button>
                        <button onClick={handleCopyLastResponse} title="Copy last AI response to clipboard"
                          className="text-xs px-2.5 py-1.5 rounded-lg text-slate-400 hover:text-slate-200 hover:bg-slate-700/50 transition-colors focus:outline-none focus:ring-2 focus:ring-violet-500/40">
                          📑 Copy Response
                        </button>
                        <button onClick={handleClearInput} title="Clear input text and attached files"
                          className="text-xs px-2.5 py-1.5 rounded-lg text-slate-400 hover:text-slate-200 hover:bg-slate-700/50 transition-colors focus:outline-none focus:ring-2 focus:ring-violet-500/40">
                          🧹 Clear
                        </button>
                        <span className="flex-1" />
                        <span className="text-[10px] text-slate-500">Enter to send · Shift+Enter for new line · Drag files to attach</span>
                      </div>
                    </div>
                    <div className="flex flex-col gap-2">
                      <button onClick={handleSend} disabled={(!input.trim() && attachedFiles.length === 0) || streaming || !connected || !selectedModel}
                        className="flex-1 bg-violet-600 hover:bg-violet-700 disabled:bg-slate-700 disabled:text-slate-500 text-white rounded-xl px-4 font-medium transition-colors disabled:cursor-not-allowed min-w-[60px]">
                        {streaming ? '...' : 'Send'}
                      </button>
                    </div>
                  </div>
                </div>
              </div>

              {/* File Browser (right panel) */}
              {showFileBrowser && (
                <aside aria-label="File browser">
                  <FileBrowser projectFolder={projectFolder} onAttachFile={attachFile} onClose={() => setShowFileBrowser(false)} />
                </aside>
              )}
            </div>
          </main>

          {showSettings && <SettingsPanel ollamaUrl={ollamaUrl} projectFolder={projectFolder} onSave={handleSaveSettings} onClose={() => setShowSettings(false)} />}
          {renaming && <RenameModal currentName={renaming.title} onSave={(name) => renameConversation(renaming.id, name)} onClose={() => setRenaming(null)} />}
          {toast && <Toast message={toast} onDone={() => setToast(null)} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
