# CI: unit tests + dependency audit (SCA). Fails on critical npm advisories.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify electron-builder artifactName (updater-safe)
        run: node scripts/verify-artifact-name-config.js

      - name: Unit tests
        run: npm run test:unit

      - name: Production build (Vite)
        run: npm run build

      - name: Dependency audit (critical only)
        run: npm audit --audit-level=critical
