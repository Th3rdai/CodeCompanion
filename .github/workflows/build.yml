# Build Electron installers (macOS, Windows, Linux) and attach them to a GitHub Release.
# Maintainer default: ship desktop releases ONLY via this workflow (push tag v* matching package.json).
# Do not use local electron:publish:* for routine releases — see docs/RELEASES-AND-UPDATES.md.
#
# Triggers on version tags (v*) and manual dispatch (build only — no release unless tag push).
#
# macOS: ad-hoc signing by default. If repo secrets MAC_CERTS + MAC_CERTS_PASSWORD + MAC_CODESIGN_IDENTITY
# are set, imports the .p12 and runs a Developer ID build (see BUILD.md → GitHub Actions).
# Optional notarization when APPLE_TEAM_ID + APPLE_ID + APPLE_APP_SPECIFIC_PASSWORD are also set.
#
# For in-app Software Updates, each release must include updater metadata (e.g. latest-mac.yml on mac)
# and matching DMG/ZIP/blockmaps — this workflow uploads all platform artifacts to one release.

name: Build Desktop Installers

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: desktop-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            script: electron:build:mac
          - os: macos-13
            platform: mac-x64
            script: electron:build:mac:x64
          - os: windows-latest
            platform: win
            script: electron:build:win
          - os: ubuntu-latest
            platform: linux
            script: electron:build:linux

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.platform }})
    # secrets allowed in job env; step `if` uses env.* so cert import stays aligned with MAC_DISTRIBUTION_SIGN
    env:
      MAC_CI_SIGNING: ${{ secrets.MAC_CERTS != '' && secrets.MAC_CERTS_PASSWORD != '' && secrets.MAC_CODESIGN_IDENTITY != '' && 'true' || 'false' }}
      MAC_CI_NOTARIZE: ${{ secrets.MAC_CERTS != '' && secrets.MAC_CERTS_PASSWORD != '' && secrets.MAC_CODESIGN_IDENTITY != '' && secrets.APPLE_TEAM_ID != '' && secrets.APPLE_ID != '' && secrets.APPLE_APP_SPECIFIC_PASSWORD != '' && 'true' || 'false' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify package.json matches tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::package.json version ($PKG) must match git tag (expected v$PKG, got $GITHUB_REF_NAME)"
            exit 1
          fi

      - name: macOS signing mode (no secret values)
        if: startsWith(matrix.platform, 'mac')
        run: |
          echo "mac_ci_signing=${MAC_CI_SIGNING} mac_ci_notarize=${MAC_CI_NOTARIZE}"

      - name: Import macOS signing certificate
        if: startsWith(matrix.platform, 'mac') && env.MAC_CI_SIGNING == 'true'
        env:
          MAC_CERTS: ${{ secrets.MAC_CERTS }}
          MAC_CERTS_PASSWORD: ${{ secrets.MAC_CERTS_PASSWORD }}
        run: |
          echo "$MAC_CERTS" | base64 --decode > /tmp/certs.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import /tmp/certs.p12 -k build.keychain -P "$MAC_CERTS_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions build.keychain
          rm /tmp/certs.p12

      - name: Build Electron installer
        run: npm run ${{ matrix.script }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MAC_DISTRIBUTION_SIGN: ${{ startsWith(matrix.platform, 'mac') && env.MAC_CI_SIGNING == 'true' && '1' || '' }}
          MAC_CODESIGN_IDENTITY: ${{ startsWith(matrix.platform, 'mac') && env.MAC_CI_SIGNING == 'true' && secrets.MAC_CODESIGN_IDENTITY || '' }}
          MAC_NOTARIZE: ${{ startsWith(matrix.platform, 'mac') && env.MAC_CI_NOTARIZE == 'true' && '1' || '' }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}

      - name: Verify updater metadata in release/ (per platform)
        run: node scripts/verify-release-output.js ${{ startsWith(matrix.platform, 'mac') && 'mac' || matrix.platform }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.platform }}
          path: release/*
          if-no-files-found: error
          retention-days: 1

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    name: Create GitHub Release
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify package.json matches tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::package.json version ($PKG) must match git tag (expected v$PKG, got $GITHUB_REF_NAME)"
            exit 1
          fi

      - name: Verify CI repo matches electron-builder publish (in-app updates)
        run: node scripts/verify-ci-repo-matches-publish.js

      - name: Download mac artifacts (arm64)
        uses: actions/download-artifact@v4
        with:
          name: installer-mac
          path: artifacts/installer-mac

      - name: Download mac artifacts (x64 — Intel)
        uses: actions/download-artifact@v4
        with:
          name: installer-mac-x64
          path: artifacts/installer-mac-x64

      - name: Merge Intel Mac artifacts and publish Intel updater feed
        run: |
          cp artifacts/installer-mac-x64/*.dmg artifacts/installer-mac/ 2>/dev/null || true
          cp artifacts/installer-mac-x64/*.dmg.blockmap artifacts/installer-mac/ 2>/dev/null || true
          cp artifacts/installer-mac-x64/*.zip artifacts/installer-mac/ 2>/dev/null || true
          cp artifacts/installer-mac-x64/*.zip.blockmap artifacts/installer-mac/ 2>/dev/null || true
          cp artifacts/installer-mac-x64/latest-mac.yml artifacts/installer-mac/latest-x64-mac.yml 2>/dev/null || true

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: installer-win
          path: artifacts/installer-win

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: installer-linux
          path: artifacts/installer-linux

      - name: Verify electron-builder artifactName (updater-safe)
        run: node scripts/verify-artifact-name-config.js

      - name: Verify updater YAML files reference on-disk assets
        run: node scripts/verify-updater-yaml-assets.js artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: true
          files: |
            artifacts/installer-mac/*
            artifacts/installer-win/*
            artifacts/installer-linux/*
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') || contains(github.ref_name, '-rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Mirror release to Th3rdai/CodeCompanion (public repo for in-app updates)
      - name: Mirror release to Th3rdai/CodeCompanion
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --repo Th3rdai/CodeCompanion \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            artifacts/installer-mac/* \
            artifacts/installer-win/* \
            artifacts/installer-linux/* || echo "::warning::Mirror release failed — create manually on Th3rdai/CodeCompanion"
