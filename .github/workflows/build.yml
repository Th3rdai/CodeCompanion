# Build Electron installers (macOS, Windows, Linux) and attach them to a GitHub Release.
# Maintainer default: ship desktop releases ONLY via this workflow (push tag v* matching package.json).
# Do not use local electron:publish:* for routine releases — see docs/RELEASES-AND-UPDATES.md.
#
# Triggers on version tags (v*) and manual dispatch (build only — no release unless tag push).
#
# ──────────────────────────────────────────────────────────────────────────────
# REQUIRED SECRETS (none required for unsigned builds)
# ──────────────────────────────────────────────────────────────────────────────
#
# macOS Developer ID signing (optional — ad-hoc by default):
#   MAC_CERTS               base64-encoded .p12 certificate (export from Keychain)
#   MAC_CERTS_PASSWORD      password for the .p12 file
#   MAC_CODESIGN_IDENTITY   full cert CN, e.g. "Developer ID Application: Your Name (TEAMID)"
#
# macOS Notarization (optional — requires signing secrets above + explicit opt-in):
#   APPLE_NOTARIZE_ENABLED  set to "1" to enable notarization
#   APPLE_TEAM_ID           10-char Apple team identifier
#   APPLE_ID                Apple ID email used to log in to developer.apple.com
#   APPLE_APP_SPECIFIC_PASSWORD  app-specific password (not your Apple ID password)
#
# Windows Authenticode signing (optional — unsigned by default).
# Two accepted formats — use whichever matches what you have:
#   WIN_CSC_LINK_B64        base64-encoded .pfx file  (preferred for new setups)
#   WIN_CSC_KEY_PASSWORD    passphrase for WIN_CSC_LINK_B64
#     — OR —
#   CSC_LINK                base64-encoded .pfx file  (legacy name; already in repo secrets)
#   CSC_KEY_PASSWORD        passphrase for CSC_LINK   (legacy name; already in repo secrets)
#
# Google Drive mirror (optional — skipped if secret is absent):
#   GDRIVE_SERVICE_ACCOUNT_JSON  Google service account JSON (full contents, not base64)
#                                  Grant this service account "Editor" on the target folder.
#   GDRIVE_FOLDER_ID        (optional) ID of the Drive folder to upload into.
#                            Leave empty to upload to the service account's My Drive root.
#                            Find it in the Drive URL: drive.google.com/drive/folders/<ID>
# ──────────────────────────────────────────────────────────────────────────────
#
# Architecture: each build job uploads directly to a draft GitHub Release (no artifact storage).
# The release job publishes the draft; the gdrive-upload job mirrors the assets to Google Drive.
# This avoids GitHub Actions artifact storage quota limits entirely.

name: Build Desktop Installers

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: desktop-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    name: Server smoke test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify server starts and binds to port
        run: node scripts/smoke-test-server.js

  build:
    needs: smoke-test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            script: electron:build:mac
          - os: macos-latest
            platform: mac-x64
            script: electron:build:mac:x64
            npm_config_arch: x64
          - os: windows-latest
            platform: win
            script: electron:build:win
          - os: ubuntu-latest
            platform: linux
            script: electron:build:linux

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.platform }})
    permissions:
      contents: write
    # Evaluate signing availability once at job level using secrets (not exposed as values).
    env:
      MAC_CI_SIGNING: ${{ secrets.MAC_CERTS != '' && secrets.MAC_CERTS_PASSWORD != '' && secrets.MAC_CODESIGN_IDENTITY != '' && 'true' || 'false' }}
      # Notarization is explicitly opt-in via APPLE_NOTARIZE_ENABLED=1 — prevents build failures
      # when an Apple Developer agreement expires (HTTP 403) while signing still works.
      # APPLE_NOTARIZE_ENABLED must equal exactly "1" — set to "0" to disable without deleting.
      MAC_CI_NOTARIZE: ${{ secrets.MAC_CERTS != '' && secrets.MAC_CERTS_PASSWORD != '' && secrets.MAC_CODESIGN_IDENTITY != '' && secrets.APPLE_TEAM_ID != '' && secrets.APPLE_ID != '' && secrets.APPLE_APP_SPECIFIC_PASSWORD != '' && secrets.APPLE_NOTARIZE_ENABLED == '1' && 'true' || 'false' }}
      # Windows Authenticode — set repo variable WIN_CI_SIGNING=true (Actions → Variables) when
      # WIN_CSC_LINK_B64 + WIN_CSC_KEY_PASSWORD secrets are configured. The toJSON/fromJSON
      # form avoids GitHub Actions language-server false positives for custom vars/secrets.
      WIN_CI_SIGNING: ${{ fromJSON(toJSON(vars)).WIN_CI_SIGNING == 'true' && 'true' || 'false' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          npm_config_arch: ${{ matrix.npm_config_arch }}

      - name: Verify package.json matches tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::package.json version ($PKG) must match git tag (expected v$PKG, got $GITHUB_REF_NAME)"
            exit 1
          fi

      # ── macOS signing ─────────────────────────────────────────────────────
      - name: macOS signing mode (no secret values)
        if: startsWith(matrix.platform, 'mac')
        run: |
          echo "mac_ci_signing=${MAC_CI_SIGNING} mac_ci_notarize=${MAC_CI_NOTARIZE}"

      - name: Import macOS signing certificate
        if: startsWith(matrix.platform, 'mac') && env.MAC_CI_SIGNING == 'true'
        env:
          MAC_CERTS: ${{ secrets.MAC_CERTS }}
          MAC_CERTS_PASSWORD: ${{ secrets.MAC_CERTS_PASSWORD }}
        run: |
          echo "$MAC_CERTS" | base64 --decode > /tmp/certs.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import /tmp/certs.p12 -k build.keychain -P "$MAC_CERTS_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions build.keychain
          rm /tmp/certs.p12

      # ── Windows signing ───────────────────────────────────────────────────
      # WIN_CSC_LINK_B64 must be a base64-encoded Windows Authenticode .pfx.
      # CSC_LINK (macOS .p12) is intentionally excluded — wrong format for Windows.
      - name: Decode Windows signing certificate
        if: matrix.platform == 'win' && env.WIN_CI_SIGNING == 'true'
        shell: bash
        env:
          WIN_CSC_LINK_B64: ${{ fromJSON(toJSON(secrets)).WIN_CSC_LINK_B64 }}
        run: |
          echo "$WIN_CSC_LINK_B64" | base64 --decode > "$RUNNER_TEMP/win-cert.pfx"
          echo "WIN_CSC_LINK=$RUNNER_TEMP/win-cert.pfx" >> "$GITHUB_ENV"

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Build Electron installer
        run: npm run ${{ matrix.script }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          npm_config_arch: ${{ matrix.npm_config_arch }}
          # macOS
          MAC_DISTRIBUTION_SIGN: ${{ startsWith(matrix.platform, 'mac') && env.MAC_CI_SIGNING == 'true' && '1' || '' }}
          MAC_CODESIGN_IDENTITY: ${{ startsWith(matrix.platform, 'mac') && env.MAC_CI_SIGNING == 'true' && secrets.MAC_CODESIGN_IDENTITY || '' }}
          MAC_NOTARIZE: ${{ startsWith(matrix.platform, 'mac') && env.MAC_CI_NOTARIZE == 'true' && '1' || '' }}
          # Only pass Apple notarization creds when notarization is enabled.
          # electron-builder 26+ auto-notarizes if APPLE_ID is present — omit when not requested.
          APPLE_TEAM_ID: ${{ startsWith(matrix.platform, 'mac') && env.MAC_CI_NOTARIZE == 'true' && secrets.APPLE_TEAM_ID || '' }}
          APPLE_ID: ${{ startsWith(matrix.platform, 'mac') && env.MAC_CI_NOTARIZE == 'true' && secrets.APPLE_ID || '' }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ startsWith(matrix.platform, 'mac') && env.MAC_CI_NOTARIZE == 'true' && secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}
          # Windows — WIN_CSC_LINK set via GITHUB_ENV; password from WIN_CSC_KEY_PASSWORD only.
          # CSC_KEY_PASSWORD is macOS-only and must never be passed to the Windows build.
          WIN_DISTRIBUTION_SIGN: ${{ matrix.platform == 'win' && env.WIN_CI_SIGNING == 'true' && '1' || '' }}
          WIN_CSC_KEY_PASSWORD: ${{ matrix.platform == 'win' && env.WIN_CI_SIGNING == 'true' && fromJSON(toJSON(secrets)).WIN_CSC_KEY_PASSWORD || '' }}

      # ── Cleanup ───────────────────────────────────────────────────────────
      - name: Clean Windows signing certificate
        if: always() && matrix.platform == 'win' && env.WIN_CI_SIGNING == 'true'
        shell: bash
        run: rm -f "$RUNNER_TEMP/win-cert.pfx"

      # ── Validation ────────────────────────────────────────────────────────
      - name: Verify updater metadata in release/ (per platform)
        run: node scripts/verify-release-output.js ${{ startsWith(matrix.platform, 'mac') && 'mac' || matrix.platform }}

      - name: Rename Intel updater feed (mac-x64 only)
        if: matrix.platform == 'mac-x64'
        shell: bash
        run: mv release/latest-mac.yml release/latest-x64-mac.yml

      # ── Upload to GitHub Release draft ────────────────────────────────────
      - name: Upload to GitHub Release draft
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          fail_on_unmatched_files: true
          files: release/*
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') || contains(github.ref_name, '-rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    name: Publish GitHub Release
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify package.json matches tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::package.json version ($PKG) must match git tag (expected v$PKG, got $GITHUB_REF_NAME)"
            exit 1
          fi

      - name: Verify CI repo matches electron-builder publish (in-app updates)
        run: node scripts/verify-ci-repo-matches-publish.js

      - name: Verify electron-builder artifactName (updater-safe)
        run: node scripts/verify-artifact-name-config.js

      - name: Publish draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          if [[ "$GITHUB_REF_NAME" == *"-beta"* ]] || [[ "$GITHUB_REF_NAME" == *"-alpha"* ]] || [[ "$GITHUB_REF_NAME" == *"-rc"* ]]; then
            gh release edit "$GITHUB_REF_NAME" --draft=false --prerelease
          else
            gh release edit "$GITHUB_REF_NAME" --draft=false --latest
          fi

  gdrive-upload:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: release
    runs-on: ubuntu-latest
    name: Mirror to Google Drive
    permissions:
      contents: read
    # Evaluate Drive credential availability without exposing the secret value.
    env:
      HAS_GDRIVE: ${{ fromJSON(toJSON(secrets)).GDRIVE_SERVICE_ACCOUNT_JSON != '' && 'true' || 'false' }}

    steps:
      - name: Check Google Drive credentials
        run: |
          if [ "$HAS_GDRIVE" = "true" ]; then
            echo "GDRIVE_SERVICE_ACCOUNT_JSON found — will mirror release to Google Drive."
          else
            echo "::notice::GDRIVE_SERVICE_ACCOUNT_JSON secret not set — skipping Google Drive mirror."
            echo "See docs/RELEASES-AND-UPDATES.md → Google Drive mirror for setup instructions."
          fi

      - name: Install rclone
        if: env.HAS_GDRIVE == 'true'
        run: |
          curl -fsSL https://rclone.org/install.sh | sudo bash
          rclone version

      - name: Download release assets from GitHub
        if: env.HAS_GDRIVE == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p release-assets
          # Download all installer and updater-feed files from the published release.
          gh release download "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --dir release-assets \
            --pattern "*.dmg" \
            --pattern "*.zip" \
            --pattern "*.exe" \
            --pattern "*.AppImage" \
            --pattern "*.yml" \
            --pattern "*.blockmap" \
            --clobber
          echo "--- Downloaded assets ---"
          ls -lh release-assets/

      - name: Upload to Google Drive via rclone
        if: env.HAS_GDRIVE == 'true'
        env:
          # rclone reads these env vars directly — no config file needed.
          RCLONE_CONFIG_GDRIVE_TYPE: drive
          RCLONE_CONFIG_GDRIVE_SCOPE: drive
          RCLONE_CONFIG_GDRIVE_SERVICE_ACCOUNT_CREDENTIALS: ${{ fromJSON(toJSON(secrets)).GDRIVE_SERVICE_ACCOUNT_JSON }}
          # When GDRIVE_FOLDER_ID is set, rclone treats it as the Drive root.
          # Empty string → rclone uses the service account's My Drive root.
          RCLONE_CONFIG_GDRIVE_ROOT_FOLDER_ID: ${{ fromJSON(toJSON(secrets)).GDRIVE_FOLDER_ID }}
        run: |
          DEST="gdrive:code-companion/${{ github.ref_name }}"
          echo "Uploading to ${DEST} ..."
          rclone copy release-assets/ "$DEST" \
            --progress \
            --stats 30s \
            --transfers 4 \
            --checksum
          echo "::notice::Assets mirrored to Google Drive path: code-companion/${{ github.ref_name }}"
